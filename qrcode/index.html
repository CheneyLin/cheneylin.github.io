<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>QR Code/URL Encode</title>
  <meta content="URL Encode/QR Code 转码工具 二维码工具" name="descriptison">
  <meta content="urlencode,qrcode,urldecode" name="keywords">

  <!-- Favicons -->
  <link href="/favicon.png" rel="icon">
  <style>
    :root {
      --bg: #090909;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #8f98a7;
      --accent: #0072f5;
      --border: rgba(255, 255, 255, 0.10);
      --shadow-card: rgba(0, 0, 0, 0.35) 0px 20px 60px -30px;
      --font-sans: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-family: var(--font-sans);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #090909 0%, #0f0f0f 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.6rem, 4vw, 3.8rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      font-weight: 700;
      max-width: 720px;
    }

    h5 {
      margin: 0 0 18px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--surface-strong);
      box-shadow: var(--shadow-card);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 28px;
    }

    #url {
      margin-bottom: 24px;
    }

    #url_input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--surface-strong);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 16px 18px;
      font-size: 1rem;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    #url_input:focus {
      outline: none;
      border-color: rgba(0, 114, 245, 0.85);
      box-shadow: 0 0 0 4px rgba(0, 114, 245, 0.12);
    }

    #url_input.error {
      border-color: #ff4d67;
      background: rgba(255, 77, 103, 0.12);
      color: #ffb3c6;
    }

    #buttons,
    #buttons2 {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 24px;
    }

    #check,
    #act,
    #encode,
    #decode,
    #encode2,
    #decode2 {
      min-width: 160px;
      border-radius: 999px;
      border: 1px solid var(--surface-strong);
      padding: 14px 18px;
      text-align: center;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    #act,
    #check {
      background: #ffffff;
      color: #0a0a0a;
      border-color: rgba(0, 0, 0, 0.08);
    }

    #check:hover,
    #act:hover,
    #encode:hover,
    #decode:hover,
    #encode2:hover,
    #decode2:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    #act {
      min-width: 210px;
      font-weight: 700;
    }

    #qrcodes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .qrcode {
      min-height: 190px;
      border-radius: 8px;
      background: #FFF;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px;
      display: grid;
      place-items: center;
      margin: 24px auto;
    }

    .qrcode canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
    }

    #url_info {
      margin-top: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 22px;
      font-size: 0.95rem;
      line-height: 1.7;
      word-break: break-word;
      min-height: 140px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-desc {
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 760px;
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 16px 32px;
      }

      #buttons,
      #buttons2 {
        flex-direction: column;
      }

      .section-header {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="section-header">
      <div>
        <h1>QRCode / URL Encode</h1>
        <p class="section-desc">快速生成二维码，并支持 URL 编码、解码与解析，适用于二维码工具与链接调试。</p>
      </div>
    </header>

    <section class="panel">
      <h5>URL</h5>
      <div id="url"><input id="url_input" type="text" value="https://d.mgtv.com/u-od"></div>
      <div id="buttons">
        <div id="check">URL分析</div>
        <div id="act">生成二维码</div>
      </div>
      <div id="buttons2">
        <div id="encode">URL编码</div>
        <div id="decode">URL解码</div>
        <div id="encode2">URL参数编码</div>
        <div id="decode2">URL参数解码</div>
      </div>
    </section>

    <section class="panel">
      <h5>QRCode</h5>
      <div id="qrcodes">
        <div class="qrcode" id="qr256"></div>
      </div>
      <h5>URL Info</h5>
      <div id="url_info"></div>
    </section>
  </main>

  <!-- Vendor JS Files -->
  <script src="jq/jquery.min.js"></script>
  <script src="jq/jquery.qrcode.js"></script>
  <script src="jq/jquery.cookie.js"></script>


  <script>
    $(function() {
      /*

      imgoecom://subChannel?channel=270308&title=%E6%98%9F%E7%B2%89%E9%A2%91%E9%81%93&searchType=2
      https://h5.ecom.mgtv.com/yg/20240531/20240531NBM6YSX/index.html?h5Report=1&source_channel=mgtv&source=mgtv_live_tab&preload_resource=0

      */

      var last_url = $.cookie('last_url');
      $('#url_input').val(last_url);
      $('#url_input').blur(function() {
        var input_text = $('#url_input').val();
        input_text = input_text.trim();
        $.cookie('last_url', input_text);
      });
      $('#url_input').dblclick(function() {
        $('#url_input').select();
      });

      function URLInfo(url) {
        try {
          const urlObject = new URL(url);
          var url_info_text = '';
          url_info_text = url_info_text + `协议: ${urlObject.protocol}` + '<br>';
          url_info_text = url_info_text + `主机名: ${urlObject.hostname}` + '<br>';
          url_info_text = url_info_text + `端口: ${urlObject.port}` + '<br>';
          url_info_text = url_info_text + `路径名: ${urlObject.pathname}` + '<br>';
          url_info_text = url_info_text + `哈希值: ${urlObject.hash}` + '<br>';
          url_info_text = url_info_text + `查询部分: ${urlObject.search}` + '<br>';

          console.log(`协议: ${urlObject.protocol}`);
          console.log(`主机名: ${urlObject.hostname}`);
          console.log(`端口: ${urlObject.port}`);
          console.log(`路径名: ${urlObject.pathname}`);
          console.log(`哈希值: ${urlObject.hash}`);
          console.log(`查询部分: ${urlObject.search}`);
          const params = new URLSearchParams(urlObject.search);

          for (const [key, value] of params.entries()) {
            console.log(` * ${key}: ${value}`);
            url_info_text = url_info_text + ` * ${key}: ${value}` + '<br>';
          }
          return url_info_text;
        } catch (err) {
          return err;
        } finally {
          console.log(`URL分析完毕`);
        }
      }

      function checkURL(url) {
        try {
          const urlObject = new URL(url);
          console.log(`协议: ${urlObject.protocol}`);
          console.log(`主机名: ${urlObject.hostname}`);
          console.log(`端口: ${urlObject.port}`);
          console.log(`路径名: ${urlObject.pathname}`);
          console.log(`哈希值: ${urlObject.hash}`);
          console.log(`查询部分: ${urlObject.search}`);
          return true;
        } catch (err) {
          $('#url_input').addClass('error');
          setTimeout(function() {
            $('#url_input').removeClass('error');
          }, 500);
          return false;
        } finally {
          console.log(`URL检查完毕`);
        }
      }

      $('#check').click(function() {
        var input_text = $('#url_input').val();
        if (!checkURL(input_text)) {
          return;
        }
        $('#url_info').html();
        $('#url_info').html(URLInfo(input_text)+'<br>'+$('#url_info').html());
      });


      $('#encode').click(function() {
        var input_text = $('#url_input').val();
        input_text = encodeURI(input_text);
        console.log(input_text)
        $('#url_input').val(input_text);
        $('#url_info').html('encodeURI:'+input_text+'<br>'+$('#url_info').html());
      });


      $('#decode').click(function() {
        var input_text = $('#url_input').val();
        input_text = decodeURI(input_text);
        console.log(input_text)
        $('#url_input').val(input_text);
        $('#url_info').html('decodeURI:'+input_text+'<br>'+$('#url_info').html());
      });

            $('#encode2').click(function() {
              var input_text = $('#url_input').val();
              input_text = encodeURIComponent(input_text);
              console.log(input_text)
              $('#url_input').val(input_text);
              $('#url_info').html('encodeURIComponent:'+input_text+'<br>'+$('#url_info').html());
            });


            $('#decode2').click(function() {
              var input_text = $('#url_input').val();
              input_text = decodeURIComponent(input_text);
              console.log(input_text)
              $('#url_input').val(input_text);
              $('#url_info').html('decodeURIComponent:'+input_text+'<br>'+$('#url_info').html());
            });

      $('#act').click(function() {
        var input_text = $('#url_input').val();
        if (!checkURL(input_text)) {
          return;
        }
        $('#qr256').html('');
        $('#qr256').qrcode({
          text: input_text,
          width: 256,
          height: 256,
          render: 'canvas'
        });
      });
    });
  </script>

</body>

</html>
