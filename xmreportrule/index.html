<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM上报规则编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 - 历史记录 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📜 历史记录</h2>
                <span class="history-count" id="historyCount">0 条</span>
            </div>
            <div class="sidebar-actions">
                <button class="btn btn-sm" onclick="exportHistoryMarkdown()">
                    <span>📤</span> 导出MD
                </button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">暂无历史记录</div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="header">
                <h1>📋 XM上报规则编辑器</h1>
                <p>输入模块标识，自动生成符合格式的JSON配置数据</p>
            </div>

            <div class="content-card">
                <div class="input-section">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="modTypeInput">模块英文标识 (mod_type)</label>
                            <input type="text" id="modTypeInput" placeholder="例如: likelist_history" autocomplete="off">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="generateJSON()">
                            <span>✨</span> API模块
                        </button>
                        <button class="btn btn-info" onclick="generateDevJSON()">
                            <span>🔧</span> DEV模块
                        </button>
                        <button class="btn btn-warning" onclick="validateJSON()">
                            <span>✅</span> 验证格式
                        </button>
                        <button class="btn btn-success" onclick="saveToHistory()">
                            <span>💾</span> 保存
                        </button>
                        <button class="btn btn-secondary" onclick="exportJSON()">
                            <span>📥</span> 导出
                        </button>
                        <button class="btn btn-secondary" onclick="copyJSON()">
                            <span>📋</span> 复制
                        </button>
                    </div>
                </div>

                <div class="help-text">
                    💡 输入 <code>mod_type</code> 后点击"API模块"或"DEV模块"，系统将自动生成符合规范的JSON骨架。
                    生成后可二次编辑，支持验证格式、保存到历史记录、导出和复制功能。
                </div>
            </div>

            <div class="content-card editor-card">
                <div class="editor-header">
                    <h3>📝 JSON 编辑器</h3>
                    <div class="editor-info">
                        <span class="json-info" id="jsonInfo">字数: 0 | 行数: 1</span>
                        <span class="json-info" id="jsonSize">0 B</span>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="jsonEditor" placeholder="请先输入 mod_type 然后点击「生成JSON」按钮...
或在此直接编辑 JSON 内容"></textarea>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-message info" id="statusMessage">
                    <span>ℹ️</span> 等待输入...
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
