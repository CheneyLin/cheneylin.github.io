<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愚公互动平台 - H5编辑器</title>
    <link href="assets/app_styles.css" rel="stylesheet">
    <link href="../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #171717;
            --muted: #4d4d4d;
            --border: rgba(0, 0, 0, 0.08);
            --border-light: rgb(235, 235, 235);
            --primary: #171717;
            --primary-text: #ffffff;
            --accent: #0070f3;
            --focus: hsla(212, 100%, 48%, 1);
            --card-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px, rgba(0, 0, 0, 0.04) 0px 2px 2px, rgba(0, 0, 0, 0.04) 0px 8px 8px -8px, #fafafa 0px 0px 0px 1px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--fg);
            background: #fafafa;
            line-height: 1.5;
            letter-spacing: -0.01em;
            font-feature-settings: "liga" 1;
        }

        /* Layout */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--primary);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar-logo {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.36px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 20px;
        }

        .sidebar-menu {
            padding: 16px 0;
        }

        .menu-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .menu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid #fff;
        }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0px 0px 0px 1px var(--border);
        }

        .top-bar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--fg);
            letter-spacing: -0.32px;
        }

        .top-bar-actions {
            display: flex;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost {
            background: white;
            color: var(--fg);
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
        }

        .btn-ghost:hover {
            background: #fafafa;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* Editor Layout */
        .editor-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            height: calc(100vh - 60px);
        }

        /* Component Panel */
        .component-panel {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-light);
            overflow-y: auto;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 20px;
            letter-spacing: -0.28px;
        }

        .component-group {
            margin-bottom: 24px;
        }

        .component-group-title {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .component-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .component-item {
            padding: 16px 12px;
            background: white;
            border-radius: 8px;
            cursor: move;
            transition: all 0.2s;
            text-align: center;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px, rgba(0, 0, 0, 0.04) 0px 2px 2px;
        }

        .component-item:hover {
            transform: translateY(-2px);
            box-shadow: rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 4px 4px, rgba(0,0,0,0.04) 0px 8px 8px -8px, #fafafa 0px 0px 0px 1px;
        }

        .component-item.new-component {
            background: linear-gradient(135deg, #f0f2ff 0%, #fff 100%);
            border: 2px dashed #0070f3;
        }

        .component-item i {
            font-size: 24px;
            color: #0070f3;
            margin-bottom: 8px;
            display: block;
        }

        .component-item-name {
            font-size: 12px;
            color: var(--fg);
            font-weight: 500;
        }

        .new-badge {
            display: inline-block;
            background: #0070f3;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 9999px;
            margin-top: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Canvas */
        .canvas {
            flex: 1;
            background: #f5f5f5;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 40px;
            position: relative;
            overflow-y: auto;
        }

        .canvas-container {
            width: 375px;
            min-height: 667px;
            background: white;
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            position: relative;
        }

        .canvas-header {
            height: 44px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: -0.26px;
        }

        .canvas-content {
            padding: 20px;
            position: relative;
            min-height: 600px;
        }

        /* Canvas Component - Bulletin (90% width square) */
        .canvas-component-bulletin {
            width: 90%;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px, rgba(0, 0, 0, 0.04) 0px 2px 2px;
            overflow: hidden;
            position: relative;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border-light);
        }

        .canvas-component-bulletin .canvas-component-header {
            height: 32px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: -0.22px;
        }

        .canvas-component-bulletin .canvas-component-body {
            flex: 1;
            padding: 12px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }

        /* Mini Bulletin Preview in Canvas */
        .mini-bulletin-row {
            position: absolute;
            left: 0;
            right: 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .mini-bulletin-item {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            margin-right: 16px;
            font-size: 10px;
            color: #171717;
            font-weight: 500;
            animation: mini-scroll-left 8s linear infinite;
        }

        @keyframes mini-scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Other Component Placeholders */
        .canvas-component-placeholder {
            width: 100%;
            height: 60px;
            background: white;
            border-radius: 8px;
            border: 2px dashed var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }

        /* Config Panel */
        .config-panel {
            width: 360px;
            background: white;
            border-left: 1px solid var(--border-light);
            overflow-y: auto;
            padding: 24px;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
        }

        .config-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .config-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--fg);
            letter-spacing: -0.32px;
        }

        .config-section {
            margin-bottom: 24px;
        }

        .config-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--fg);
            margin-bottom: 8px;
        }

        .config-label .required {
            color: #ff5b4f;
            margin-left: 2px;
        }

        .config-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
            transition: all 0.2s;
        }

        .config-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--focus);
        }

        .config-select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
            cursor: pointer;
        }

        .config-select:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--focus);
        }

        .config-hint {
            font-size: 12px;
            color: #808080;
            margin-top: 6px;
        }

        /* Search Results Dropdown */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 4px 4px, rgba(0,0,0,0.04) 0px 8px 8px -8px, #fafafa 0px 0px 0px 1px;
            margin-top: 4px;
            z-index: 100;
            overflow: hidden;
        }

        .search-result-item {
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border-light);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #fafafa;
        }

        /* Tags */
        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .topic-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #ebf5ff;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            color: #0068d6;
        }

        .topic-tag .bi-x-lg {
            cursor: pointer;
            color: #0068d6;
            font-size: 12px;
            transition: color 0.15s;
        }

        .topic-tag .bi-x-lg:hover {
            color: #ff5b4f;
        }

        /* Preview Button */
        .preview-btn {
            width: 100%;
            margin-bottom: 20px;
        }

        /* Prototype module for PRD linkage */
        .prototype-module {
            position: relative;
        }

        .prototype-module[data-prototype] {
            transition: all 0.3s;
        }

        .prototype-module.feature-highlight {
            box-shadow: 0 0 0 2px #ff0000, 0 4px 12px rgba(255,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">愚公互动平台</div>
            <div class="sidebar-menu">
                <div class="menu-item"><i class="bi bi-collection" style="margin-right: 12px; font-size: 18px;"></i>活动列表</div>
                <div class="menu-item active"><i class="bi bi-phone" style="margin-right: 12px; font-size: 18px;"></i>H5编辑器</div>
                <div class="menu-item"><i class="bi bi-bar-chart" style="margin-right: 12px; font-size: 18px;"></i>数据分析</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-title">H5编辑器 - 明星应援活动</div>
                <div class="top-bar-actions">
                    <button class="btn btn-ghost"><i class="bi bi-eye"></i> 预览</button>
                    <button class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存并发布</button>
                </div>
            </div>

            <!-- Editor Layout -->
            <div class="editor-layout">
                <!-- Component Panel -->
                <div class="component-panel prototype-module" data-prototype="admin_bulletin_module">
                    <div class="panel-title">组件库</div>
                    
                    <div class="component-group">
                        <div class="component-group-title">基础组件</div>
                        <div class="component-grid">
                            <div class="component-item">
                                <i class="bi bi-text-paragraph"></i>
                                <div class="component-item-name">文本</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-image"></i>
                                <div class="component-item-name">图片</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-toggle-on"></i>
                                <div class="component-item-name">按钮</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-input-cursor-text"></i>
                                <div class="component-item-name">输入框</div>
                            </div>
                        </div>
                    </div>

                    <div class="component-group">
                        <div class="component-group-title">互动组件</div>
                        <div class="component-grid">
                            <div class="component-item new-component prototype-module" data-prototype="admin_bulletin_module">
                                <i class="bi bi-chat-square-text"></i>
                                <div class="component-item-name">弹幕墙</div>
                                <div class="new-badge">NEW</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-hand-thumbs-up"></i>
                                <div class="component-item-name">投票</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-gift"></i>
                                <div class="component-item-name">抽奖</div>
                            </div>
                            <div class="component-item">
                                <i class="bi bi-hourglass-split"></i>
                                <div class="component-item-name">倒计时</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Canvas -->
                <div class="canvas">
                    <div class="canvas-container">
                        <div class="canvas-header">H5 页面画布</div>
                        <div class="canvas-content">
                            <!-- Banner Component Placeholder -->
                            <div class="canvas-component-placeholder" style="margin-bottom: 20px;">
                                <i class="bi bi-card-image" style="margin-right: 8px; font-size: 16px;"></i>
                                <span>轮播图组件</span>
                            </div>

                            <!-- Title Component Placeholder -->
                            <div class="canvas-component-placeholder" style="margin-bottom: 20px;">
                                <i class="bi bi-type-h1" style="margin-right: 8px; font-size: 16px;"></i>
                                <span>标题组件</span>
                            </div>

                            <!-- Bulletin Component (Large Square, 90% width) -->
                            <div class="canvas-component-bulletin prototype-module" data-prototype="h5_bulletin">
                                <div class="canvas-component-header"><i class="bi bi-chat-square-text" style="margin-right: 6px;"></i>弹幕墙组件</div>
                                <div class="canvas-component-body">
                                    <div id="miniBulletinPreview"></div>
                                </div>
                            </div>

                            <!-- Image Component Placeholder -->
                            <div class="canvas-component-placeholder" style="margin-top: 20px;">
                                <i class="bi bi-image" style="margin-right: 8px; font-size: 16px;"></i>
                                <span>图片展示组件</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Config Panel -->
                <div class="config-panel prototype-module" data-prototype="admin_bulletin_module">
                    <div class="config-header">
                        <div class="config-title">弹幕墙配置</div>
                    </div>

                    <button class="btn btn-primary preview-btn" onclick="togglePreview()">
                        <i class="bi bi-play-fill"></i> 预览弹幕效果
                    </button>

                    <div class="config-section">
                        <div class="config-label">话题ID <span class="required">*</span></div>
                        <div class="search-input-wrapper" style="position: relative;">
                            <input type="text" class="config-input" id="topicSearch" placeholder="输入关键字搜索话题" oninput="searchTopics(this.value)" onkeydown="handleTopicKeyDown(event)">
                            
                            <!-- Search Results Dropdown -->
                            <div class="search-results" id="searchResults" style="display: none;">
                                <div class="search-result-item" onclick="selectTopic('明星应援话题', 10001, 45)">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <div>
                                            <div style="font-size: 13px; color: var(--fg); font-weight: 500;">#明星应援话题#</div>
                                            <div style="font-size: 11px; color: var(--muted); margin-top: 2px;">ID: 10001</div>
                                        </div>
                                        <div style="font-size: 11px; color: #0070f3;">45条帖子</div>
                                    </div>
                                </div>
                                <div class="search-result-item" onclick="selectTopic('粉丝打卡', 10002, 128)">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <div>
                                            <div style="font-size: 13px; color: var(--fg); font-weight: 500;">#粉丝打卡#</div>
                                            <div style="font-size: 11px; color: var(--muted); margin-top: 2px;">ID: 10002</div>
                                        </div>
                                        <div style="font-size: 11px; color: #0070f3;">128条帖子</div>
                                    </div>
                                </div>
                                <div class="search-result-item" onclick="selectTopic('新歌首发', 10003, 67)">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <div>
                                            <div style="font-size: 13px; color: var(--fg); font-weight: 500;">#新歌首发#</div>
                                            <div style="font-size: 11px; color: var(--muted); margin-top: 2px;">ID: 10003</div>
                                        </div>
                                        <div style="font-size: 11px; color: #0070f3;">67条帖子</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Selected Topics Tags -->
                        <div class="selected-tags" id="selectedTopics">
                            <div class="topic-tag" data-id="10001">
                                <span>#明星应援话题#</span>
                                <i class="bi bi-x-lg" onclick="removeTopic(10001)"></i>
                            </div>
                            <div class="topic-tag" data-id="10002">
                                <span>#粉丝打卡#</span>
                                <i class="bi bi-x-lg" onclick="removeTopic(10002)"></i>
                            </div>
                        </div>
                        <div class="config-hint">已选择 2 个话题</div>
                    </div>

                    <div class="config-section">
                        <div class="config-label">行数</div>
                        <input type="number" class="config-input" id="bulletinRows" value="6" min="3" max="10" onchange="updateBulletinPreview()">
                        <div class="config-hint">同时展示的弹幕行数（3-10行）</div>
                    </div>

                    <div class="config-section">
                        <div class="config-label">样式</div>
                        <select class="config-select" id="bulletinStyle" onchange="updateBulletinPreview()">
                            <option value="1">仅标题</option>
                            <option value="2">标题+内容摘要</option>
                            <option value="3">用户头像+标题</option>
                            <option value="4">用户头像+标题+内容摘要</option>
                        </select>
                    </div>

                    <div class="config-section">
                        <div class="config-label">排序</div>
                        <select class="config-select" id="bulletinSort" onchange="updateBulletinPreview()">
                            <option value="latest">按最新发布时间排序</option>
                            <option value="likes">按点赞数排序</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPreviewMode = false;
        let selectedTopicIds = [10001, 10002];
        let searchTimeout = null;

        function searchTopics(keyword) {
            clearTimeout(searchTimeout);
            
            if (keyword.length < 2) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }

            // 防抖500ms后触发搜索建议
            searchTimeout = setTimeout(() => {
                document.getElementById('searchResults').style.display = 'block';
            }, 500);
        }

        function selectTopic(name, id, postCount) {
            if (selectedTopicIds.includes(id)) return;
            selectedTopicIds.push(id);
            
            const container = document.getElementById('selectedTopics');
            const tag = document.createElement('div');
            tag.className = 'topic-tag';
            tag.dataset.id = id;
            tag.innerHTML = `<span>#${name}#</span><i class="bi bi-x-lg" onclick="removeTopic(${id})"></i>`;
            container.appendChild(tag);
            
            updateTopicCount();
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('topicSearch').value = '';
            updateBulletinPreview();
        }

        function removeTopic(id) {
            selectedTopicIds = selectedTopicIds.filter(topicId => topicId !== id);
            const tag = document.querySelector(`.topic-tag[data-id="${id}"]`);
            if (tag) tag.remove();
            updateTopicCount();
            updateBulletinPreview();
        }

        function updateTopicCount() {
            const count = selectedTopicIds.length;
            const hint = document.querySelector('.config-section .config-hint');
            if (hint) hint.textContent = `已选择 ${count} 个话题`;
        }

        function handleTopicKeyDown(event) {
            const results = document.getElementById('searchResults');
            if (results.style.display === 'none') return;
            
            const items = results.querySelectorAll('.search-result-item');
            const activeIndex = Array.from(items).findIndex(item => item.matches(':hover'));

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                const nextIndex = (activeIndex + 1) % items.length;
                items[nextIndex]?.scrollIntoView({ block: 'nearest' });
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                const prevIndex = (activeIndex - 1 + items.length) % items.length;
                items[prevIndex]?.scrollIntoView({ block: 'nearest' });
            } else if (event.key === 'Enter' && activeIndex >= 0) {
                event.preventDefault();
                items[activeIndex].click();
            } else if (event.key === 'Escape') {
                results.style.display = 'none';
            }
        }

        function updateBulletinPreview() {
            const preview = document.getElementById('miniBulletinPreview');
            const rows = parseInt(document.getElementById('bulletinRows').value) || 6;
            
            preview.innerHTML = '';
            const maxRows = Math.min(rows, 6);

            for (let i = 0; i < maxRows; i++) {
                const row = document.createElement('div');
                row.className = 'mini-bulletin-row';
                row.style.top = (i * (100 / maxRows) + 2) + '%';
                row.style.animationDelay = (i * -1.3) + 's';

                const item = document.createElement('div');
                item.className = 'mini-bulletin-item';
                
                const sampleData = ['生日快乐！', '哥哥太帅了', '应援打卡', '新歌好听', '永远支持', '加油！'];
                item.innerHTML = sampleData[i % sampleData.length];

                row.appendChild(item);
                preview.appendChild(row);
            }
        }

        function togglePreview() {
            isPreviewMode = !isPreviewMode;
            const btn = document.querySelector('.preview-btn');
            btn.innerHTML = isPreviewMode ? '<i class="bi bi-pause-fill"></i> 退出预览' : '<i class="bi bi-play-fill"></i> 预览弹幕效果';
        }

        // Listen for PRD highlight messages
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const featureId = event.data.featureId;
                document.querySelectorAll('.prototype-module').forEach(module => {
                    module.classList.remove('feature-highlight');
                });
                const targetModule = document.querySelector(`.prototype-module[data-prototype="${featureId}"]`);
                if (targetModule) {
                    targetModule.classList.add('feature-highlight');
                    targetModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => {
                        targetModule.classList.remove('feature-highlight');
                    }, 3000);
                }
            }
        });

        // Close search results when clicking outside
        document.addEventListener('click', function(event) {
            const searchWrapper = document.querySelector('.search-input-wrapper');
            const searchResults = document.getElementById('searchResults');
            if (searchWrapper && !searchWrapper.contains(event.target)) {
                searchResults.style.display = 'none';
            }
        });

        // Initialize preview
        updateBulletinPreview();
    </script>
</body>
</html>
