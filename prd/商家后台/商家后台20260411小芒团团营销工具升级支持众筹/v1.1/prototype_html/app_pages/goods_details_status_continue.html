<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>达标继续售卖 - 商品详情页</title>
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <link href="../../style/main.css" rel="stylesheet" />
    <link href="../../style/app-styles.css" rel="stylesheet" />
</head>
<body>
    <div class="status-bar"><span>15:30</span><span>📶 🔋</span></div>
    <div class="nav-bar"><span class="back"><i class="bi bi-chevron-left"></i></span><span class="title">商品详情</span><span><i class="bi bi-share"></i></span></div>

    <div class="product-image">
        <span><i class="bi bi-box-seam badge-icon"></i></span>
        <span class="badge success"><i class="bi bi-check-circle"></i> 达标继续售</span>
    </div>
    <div class="price-bar prototype-module" data-prototype="app_goods_details_price_bar">
        <div class="price-bar-bg"></div>
        <div class="price-bar-overlay"></div>
        <span class="price-bar-title"><i class="bi bi-trophy"></i> 众筹活动</span>
        <div class="price-bar-content">
            <div class="price-bar-top">
                <div class="price-row">
                    <span class="price-symbol">¥</span>
                    <span class="price-value">128</span>
                    <span class="price-original">原价 ¥199</span>
                </div>
            </div>
            <div class="price-bar-bottom">
                <div class="time-info">
                    <span class="time-prefix">距结束：</span>
                    <span class="time-value">3</span><span class="time-unit">天</span>
                    <span class="time-value">12</span><span class="time-unit">时</span>
                    <span class="time-value">30</span><span class="time-unit">分</span>
                    <span class="time-suffix">结束</span>
                </div>
            </div>
        </div>
    </div>


    <div class="product-info">
        <div class="product-name">春季新品 众筹限定 高品质生活好物</div>
        <div class="product-desc">精选优质材料，匠心打造，为您带来全新生活体验。</div>
    </div>
    
    <div class="crowd-section prototype-module" data-prototype="app_goods_details_progress_bar">
        <div class="crowd-bg"></div>
        <div class="crowd-content">
                <div class="stats-header">
                    <div class="stats-target">
                        <span class="stats-target-label">目标 500 件</span>
                    </div>
                    <span class="stats-rule">活动规则</span>
                </div>
            <div class="crowd-stats-card">
                <div class="progress-row">
                    <div class="progress-info">
                        <span class="progress-label">已筹</span>
                        <span class="progress-value">600</span>
                        <span class="progress-label">件</span>
                    </div>
                    <span class="progress-percent">120%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: 100%;"></div>
                    <div class="progress-bar-shine"></div>
                </div>
            <div class="crowd-footer">
                <span class="crowd-desc"><i class="bi bi-info-circle"></i> 未达成目标后七天内退款</span>
            </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-actions">
            <div class="bottom-action-item">
                <div class="bottom-action-icon"><i class="bi bi-headset"></i></div>
                <span class="bottom-action-text">客服</span>
            </div>
            <div class="bottom-action-item">
                <div class="bottom-action-icon"><i class="bi bi-heart"></i></div>
                <span class="bottom-action-text">已收藏</span>
            </div>
            <div class="bottom-action-item">
                <div class="cart-badge"><span class="cart-badge-text">99</span></div>
                <div class="bottom-action-icon"><i class="bi bi-cart"></i></div>
                <span class="bottom-action-text">购物车</span>
            </div>
        </div>
        <button class="bottom-cta active"><span class="bottom-cta-text">去支持</span></button>
    </div>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight' && e.data.featureId) {
                document.querySelectorAll('.prototype-module').forEach(m => m.classList.remove('feature-highlight'));
                const target = document.querySelector(`.prototype-module[data-prototype="${e.data.featureId}"]`);
                if (target) {
                    target.classList.add('feature-highlight');
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => target.classList.remove('feature-highlight'), 3000);
                }
            }
        });
    </script>
</body>
</html>
