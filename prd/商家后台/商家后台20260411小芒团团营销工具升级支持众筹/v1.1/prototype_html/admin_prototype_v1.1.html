<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小芒团团营销工具 - 商家后台</title>
    <link href="../assets/bootstrap.main.css" rel="stylesheet">
    <link href="../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 240px;
            background: #1a1a2e;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 20px;
        }

        .sidebar-menu {
            padding: 16px 0;
        }

        .menu-group-title {
            padding: 12px 24px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .menu-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .menu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid #fff;
        }

        .menu-item i {
            font-size: 18px;
            width: 18px;
        }

        .main-content {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            background: #f5f7fa;
        }

        .main-content iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-shop"></i>
            <span style="margin-left: 8px;">商家后台</span>
        </div>
        <div class="sidebar-menu">
            <div class="menu-group-title">营销中心</div>
            <div class="menu-item active" data-page="crowd_activity.html" onclick="loadPage('crowd_activity.html', this)">
                <i class="bi bi-bullseye"></i>
                <span>小芒团团</span>
            </div>
            <div class="menu-item" data-page="coupon_manage.html" onclick="loadPage('coupon_manage.html', this)">
                <i class="bi bi-ticket-perforated"></i>
                <span>优惠券管理</span>
            </div>

            <div class="menu-group-title" style="margin-top: 20px;">订单管理</div>
            <div class="menu-item" data-page="order_manage.html" onclick="loadPage('order_manage.html', this)">
                <i class="bi bi-file-earmark-text"></i>
                <span>订单列表</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <iframe id="adminFrame" src="admin_pages/crowd_activity.html" frameborder="0"></iframe>
    </div>

    <script>
        let currentPage = 'crowd_activity.html';

        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            const frame = document.getElementById('adminFrame');
            frame.src = `admin_pages/${pageUrl}`;

            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });

            if (element) {
                element.classList.add('active');
            } else {
                const menuItem = document.querySelector(`[data-page="${pageUrl}"]`);
                if (menuItem) {
                    menuItem.classList.add('active');
                }
            }

            window.location.hash = pageUrl;
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                if (menuItem) {
                    loadPage(targetPage, menuItem);
                }
            }
        });

        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const featureId = event.data.featureId;

                let targetPage = null;
                if (featureId.startsWith('admin_activity_list') || featureId.startsWith('admin_activity_list_popup_info') || featureId.startsWith('admin_activity_list_popup_extra')) {
                    targetPage = 'crowd_activity.html';
                } else if (featureId.startsWith('admin_order_manage')) {
                    targetPage = 'order_manage.html';
                }

                if (targetPage) {
                    const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                    if (menuItem) {
                        loadPage(targetPage, menuItem);

                        setTimeout(() => {
                            const frame = document.getElementById('adminFrame');
                            if (frame && frame.contentWindow) {
                                frame.contentWindow.postMessage({
                                    action: 'highlight',
                                    featureId: featureId
                                }, '*');
                            }
                        }, 300);
                    }
                }
            }
        });

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });

        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
    </script>
</body>
</html>
