<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小芒团团营销工具 - APP 端原型</title>
    <link href="../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --geist-black: #171717; --geist-white: #ffffff; --geist-gray-600: #4d4d4d;
            --geist-gray-100: #ebebeb; --geist-gray-50: #fafafa;
            --shadow-border: rgba(0,0,0,0.08) 0px 0px 0px 1px;
            --shadow-card: rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 2px, rgba(0,0,0,0.04) 0px 8px 8px -8px, var(--geist-gray-50) 0px 0px 0px 1px;
            --focus-blue: hsla(212, 100%, 48%, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; background: var(--geist-white); color: var(--geist-black); min-height: 100vh; }
        
        h1 { text-align: center; margin: 20px 0 0; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 2; }
        
        #prototypeContainer { width: 100%; min-height: 100vh; transition: all 0.3s ease; }
        
        .global-view { padding: 40px; max-width: 1800px; margin: 0 auto; }
        .global-view-header { text-align: center; margin-bottom: 64px; }
        .global-view-header h1 { color: var(--geist-black); margin-bottom: 16px; }
        .global-view-header p { color: var(--geist-gray-600); }
        .global-view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(399px, 1fr)); gap: 48px; justify-content: center; }
        .global-view .phone-frame-container { width: 399px !important; height: 836px !important; margin: 0 auto; position: relative; }
        .global-view .phone-frame-container::after { content: attr(data-page-label); display: block; text-align: center; margin-top: 16px; font-size: 14px; font-weight: 500; color: var(--geist-gray-600); }
        
        .single-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
        
        .phone-frame-container { position: relative; width: 399px; height: 836px; background: var(--geist-black); border-radius: 50px; padding: 12px; box-shadow: var(--shadow-card); flex-shrink: 0; }
        .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: var(--geist-black); border-radius: 0 0 20px 20px; z-index: 100; }
        .phone-screen { width: 375px; height: 812px; background: var(--geist-white); border-radius: 40px; overflow: hidden; position: relative; }
        .phone-screen iframe { width: 375px; height: 812px; border: none; }
        
        .controls-bar { position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 1000; background: var(--geist-white); padding: 8px; border-radius: 8px; box-shadow: var(--shadow-card); }
        .control-btn { background: var(--geist-white); color: var(--geist-black); border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-border); min-height: 38px; }
        .control-btn:hover { background: var(--geist-gray-50); transform: translateY(-1px); }
        .control-btn.active { background: var(--geist-black); color: var(--geist-white); }
        .control-btn:focus { outline: 2px solid var(--focus-blue); outline-offset: 2px; }
        
        .page-selector-bar { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: var(--geist-white); border-radius: 8px; padding: 8px; box-shadow: var(--shadow-card); z-index: 1000; display: flex; gap: 6px; }
        .page-item-bar { padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--geist-gray-600); display: flex; align-items: center; gap: 6px; white-space: nowrap; box-shadow: var(--shadow-border); min-height: 38px; }
        .page-item-bar:hover { background: var(--geist-gray-50); color: var(--geist-black); }
        .page-item-bar.active { background: var(--geist-black); color: var(--geist-white); }
        .page-item-bar i { font-size: 14px; width: 14px; }
        
        .global-only { display: none !important; }
        .single-only { display: none !important; }
        .global-view .single-only { display: none !important; }
        .global-view .global-only { display: block !important; }
        .single-view .global-only { display: none !important; }
        .single-view .single-only { display: block !important; }
    </style>
</head>
<body>
    <h1>小芒团团营销工具 APP 原型设计</h1>
    
    <div class="page-selector-bar single-only">
        <div class="page-item-bar active" data-page="goods_details_status_running.html" onclick="loadPage('goods_details_status_running.html', this)">
            <i class="bi bi-bullseye"></i><span>进行中</span>
        </div>
        <div class="page-item-bar" data-page="goods_details_status_success.html" onclick="loadPage('goods_details_status_success.html', this)">
            <i class="bi bi-check-circle"></i><span>众筹成功</span>
        </div>
        <div class="page-item-bar" data-page="goods_details_status_fail.html" onclick="loadPage('goods_details_status_fail.html', this)">
            <i class="bi bi-x-circle"></i><span>众筹失败</span>
        </div>
        <div class="page-item-bar" data-page="goods_details_status_end.html" onclick="loadPage('goods_details_status_end.html', this)">
            <i class="bi bi-clock"></i><span>活动已结束</span>
        </div>
    </div>
    
    <div class="controls-bar">
        <button class="control-btn active" id="btnSingleView" onclick="switchView('single')"><i class="bi bi-phone"></i><span>单独界面</span></button>
        <button class="control-btn" id="btnGlobalView" onclick="switchView('global')"><i class="bi bi-grid-3x3"></i><span>全局视图</span></button>
    </div>
    
    <div id="prototypeContainer" class="single-view">
        <div class="phone-frame-container single-only">
            <div class="phone-notch"></div>
            <div class="phone-screen"><iframe id="prototypeFrame" src="app_pages/goods_details_status_running.html" frameborder="0"></iframe></div>
        </div>
        <div class="global-view global-only">
            <div class="global-view-header"><h1>众筹商品详情页 - 4种状态</h1><p>进行中 / 成功 / 失败 / 已结束</p></div>
            <div class="global-view-grid">
                <div class="phone-frame-container" data-page-label="进行中">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="app_pages/goods_details_status_running.html" frameborder="0"></iframe></div>
                </div>
                <div class="phone-frame-container" data-page-label="众筹成功">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="app_pages/goods_details_status_success.html" frameborder="0"></iframe></div>
                </div>
                <div class="phone-frame-container" data-page-label="众筹失败">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="app_pages/goods_details_status_fail.html" frameborder="0"></iframe></div>
                </div>
                <div class="phone-frame-container" data-page-label="活动已结束">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="app_pages/goods_details_status_end.html" frameborder="0"></iframe></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentView = 'single', currentPage = 'goods_details_status_running.html';
        
        function switchView(mode) {
            currentView = mode;
            const c = document.getElementById('prototypeContainer');
            c.className = mode === 'single' ? 'single-view' : 'global-view';
            document.getElementById('btnSingleView').classList.toggle('active', mode === 'single');
            document.getElementById('btnGlobalView').classList.toggle('active', mode === 'global');
            window.location.hash = mode;
        }
        
        function loadPage(url, el) {
            currentPage = url;
            document.getElementById('prototypeFrame').src = 'app_pages/' + url;
            document.querySelectorAll('.page-item-bar').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            window.location.hash = 'single-' + url;
        }
        
        window.addEventListener('hashchange', function() {
            const h = window.location.hash.substring(1);
            if (h === 'global') switchView('global');
            else if (h === 'single') switchView('single');
            else if (h.startsWith('single-')) {
                switchView('single');
                const url = h.substring(7);
                const el = document.querySelector(`[data-page="${url}"]`);
                if (el) loadPage(url, el);
            }
        });
        
        window.addEventListener('DOMContentLoaded', function() {
            const h = window.location.hash.substring(1);
            if (h) { const el = document.querySelector(`[data-page="${h.substring(7)}"]`); if (el) loadPage(h.substring(7), el); }
        });
        
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight' && e.data.featureId) {
                const fid = e.data.featureId;
                let tp = 'goods_details_status_running.html';
                if (fid.startsWith('app_goods_details_status_running')) tp = 'goods_details_status_running.html';
                else if (fid.startsWith('app_goods_details_status_success')) tp = 'goods_details_status_success.html';
                else if (fid.startsWith('app_goods_details_status_fail')) tp = 'goods_details_status_fail.html';
                else if (fid.startsWith('app_goods_details_status_end')) tp = 'goods_details_status_end.html';
                
                if (currentView !== 'single') switchView('single');
                setTimeout(() => {
                    const el = document.querySelector(`[data-page="${tp}"]`);
                    if (el) { loadPage(tp, el); const pf = document.querySelector('.phone-frame-container.single-only'); if (pf) { pf.style.boxShadow = '0 0 0 3px #0070f3, var(--shadow-card)'; setTimeout(() => pf.style.boxShadow = '', 2000); } }
                }, 100);
            }
        });
    </script>
</body>
</html>
