<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>商家后台芒芒赏产品优化</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="商家后台芒芒赏产品优化 - PRD 和 HTML原型">
  <link href="style/main.css" rel="stylesheet">
  <link href="style/index-styles.css" rel="stylesheet">
</head>
<body>
  <div class="header">
    <span class="header-title">商家后台芒芒赏产品优化</span>
    <span class="version-badge">v2.1</span>
    <div class="divider"></div>
    <div class="controls">
      <div class="product-btns">
        <button class="product-btn active" data-product="admin" onclick="switchProduct('admin')">商家后台</button>
      </div>
      <div class="divider"></div>
      <div class="width-control">
        <span>右侧宽度</span>
        <input id="rightWidth" type="range" min="30" max="70" value="50">
        <span id="rightWidthLabel">50%</span>
      </div>
      <div class="divider"></div>
      <div class="width-control">
        <label for="versionSelect">版本</label>
        <select id="versionSelect" onchange="switchVersion(this.value)">
          <option value="2.1" selected>v2.1</option>
        </select>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="left">
      <iframe id="prdFrame" class="frame" src="./v2.1/prd_html/prd_v2.1.html"></iframe>
    </div>
    <div class="split" id="splitter" title="拖动调整左右宽度"></div>
    <div class="right">
      <iframe id="protoFrame" class="frame" src="./v2.1/prototype_html/admin_prototype_v2.1.html"></iframe>
    </div>
  </div>

  <!-- 隐藏预加载容器 -->
  <div id="preloadContainer" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;visibility:hidden;pointer-events:none;"></div>

  <script>
    const prdFrame = document.getElementById('prdFrame');
    const protoFrame = document.getElementById('protoFrame');
    const rightWidthRange = document.getElementById('rightWidth');
    const rightWidthLabel = document.getElementById('rightWidthLabel');
    const versionSelect = document.getElementById('versionSelect');
    const leftPane = document.querySelector('.left');
    const rightPane = document.querySelector('.right');
    const splitter = document.getElementById('splitter');
    const preloadContainer = document.getElementById('preloadContainer');
    let currentProduct = 'admin';
    let currentVersion = '2.1';
    let pendingHighlightId = null;

    // 原型预加载管理器
    const PrototypePreloader = {
      iframePool: new Map(),
      preloadedPages: new Set(),
      preloadQueue: [],
      isPreloading: false,
      currentVisibleSrc: null,

      getIframeKey(src) { return src; },

      createPreloadIframe(src) {
        const iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;visibility:hidden;pointer-events:none;';
        iframe.className = 'preload-iframe';
        return iframe;
      },

      preload(src) {
        const key = this.getIframeKey(src);
        if (this.preloadedPages.has(key)) return;
        this.preloadedPages.add(key);
        const iframe = this.createPreloadIframe(src);
        this.iframePool.set(key, iframe);
        preloadContainer.appendChild(iframe);
        iframe.addEventListener('load', () => {
          if (!pendingHighlightId) return;
          iframe.contentWindow.postMessage({ action: 'highlight', featureId: pendingHighlightId }, '*');
          pendingHighlightId = null;
        });
      },

      preloadAllPrototypes(versions, products) {
        const srcs = [];
        versions.forEach(version => {
          products.forEach(product => {
            const src = `./v${version}/prototype_html/${product}_prototype_v${version}.html`;
            srcs.push(src);
          });
        });
        this.preloadQueue = srcs;
        this.startPreloadQueue();
      },

      startPreloadQueue() {
        if (this.isPreloading || this.preloadQueue.length === 0) return;
        this.isPreloading = true;
        this.preloadNext();
      },

      preloadNext() {
        if (this.preloadQueue.length === 0) {
          this.isPreloading = false;
          return;
        }
        const src = this.preloadQueue.shift();
        this.preload(src);
        const key = this.getIframeKey(src);
        const iframe = this.iframePool.get(key);
        if (iframe) {
          iframe.onload = () => { setTimeout(() => this.preloadNext(), 100); };
        } else {
          setTimeout(() => this.preloadNext(), 100);
        }
      },

      switchProto(newSrc) {
        const key = this.getIframeKey(newSrc);
        const cachedIframe = this.iframePool.get(key);
        if (cachedIframe) {
          const currentIframe = window.protoFrame || protoFrame;
          const oldSrc = this.currentVisibleSrc || currentIframe.src;
          const oldKey = this.getIframeKey(oldSrc);
          currentIframe.style.display = 'none';
          currentIframe.id = '';
          currentIframe.className = 'preload-iframe';
          currentIframe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;visibility:hidden;pointer-events:none;';
          preloadContainer.appendChild(currentIframe);
          this.iframePool.set(oldKey, currentIframe);
          cachedIframe.id = 'protoFrame';
          cachedIframe.className = 'frame';
          cachedIframe.style.cssText = 'width:100%;height:100%;border:0;display:block;';
          rightPane.appendChild(cachedIframe);
          this.currentVisibleSrc = newSrc;
          window.protoFrame = cachedIframe;
          return true;
        }
        return false;
      }
    };

    function setupProtoFrameListener(iframe) {
      iframe.addEventListener('load', () => {
        if (!pendingHighlightId) return;
        iframe.contentWindow.postMessage({ action: 'highlight', featureId: pendingHighlightId }, '*');
        pendingHighlightId = null;
      });
    }

    window.protoFrame = protoFrame;
    setupProtoFrameListener(protoFrame);
    PrototypePreloader.currentVisibleSrc = protoFrame.src;

    function switchVersion(version) {
      currentVersion = version;
      prdFrame.src = `./v${version}/prd_html/prd_v${version}.html`;
      const newSrc = `./v${version}/prototype_html/admin_prototype_v${version}.html`;
      if (!PrototypePreloader.switchProto(newSrc)) {
        window.protoFrame.src = newSrc;
        PrototypePreloader.currentVisibleSrc = newSrc;
      }
    }

    function switchProduct(product) {
      currentProduct = product;
      document.querySelectorAll('.product-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.product === product) btn.classList.add('active');
      });
      const newSrc = `./v${currentVersion}/prototype_html/admin_prototype_v${currentVersion}.html`;
      if (!PrototypePreloader.switchProto(newSrc)) {
        window.protoFrame.src = newSrc;
        PrototypePreloader.currentVisibleSrc = newSrc;
      }
    }

    function setRightWidth(percent) {
      percent = Math.max(30, Math.min(70, percent));
      rightWidthLabel.textContent = percent + '%';
      rightPane.style.width = percent + '%';
      leftPane.style.width = (100 - percent) + '%';
      localStorage.setItem('prdSplitRatio', percent);
    }
    rightWidthRange.addEventListener('input', (e) => setRightWidth(parseInt(e.target.value, 10)));

    const savedRatio = localStorage.getItem('prdSplitRatio');
    if (savedRatio) {
      const ratio = parseInt(savedRatio, 10);
      rightWidthRange.value = ratio;
      setRightWidth(ratio);
    } else {
      setRightWidth(parseInt(rightWidthRange.value, 10));
    }

    let dragging = false;
    splitter.addEventListener('mousedown', () => { dragging = true; });
    window.addEventListener('mouseup', () => { dragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rect = document.querySelector('.main').getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percentRight = Math.round(((rect.width - x) / rect.width) * 100);
      setRightWidth(percentRight);
      rightWidthRange.value = percentRight;
    });

    // 监听来自 PRD 的消息，联动原型高亮
    window.addEventListener('message', (e) => {
      const data = e.data || {};
      if ((data.action === 'highlight' || data.type === 'prd-focus') && (data.featureId || data.id)) {
        const fid = String(data.featureId || data.id);
        let targetProduct = 'admin';
        if (fid.startsWith('admin_')) {
          targetProduct = 'admin';
        }
        if (targetProduct !== currentProduct) {
          pendingHighlightId = fid;
          switchProduct(targetProduct);
          return;
        }
        const currentProtoFrame = window.protoFrame || protoFrame;
        currentProtoFrame.contentWindow.postMessage({ action: 'highlight', featureId: fid }, '*');
      }
    });

    // 页面加载完成后开始预加载
    window.addEventListener('DOMContentLoaded', () => {
      const versions = ['2.1'];
      const products = ['admin'];
      PrototypePreloader.preloadAllPrototypes(versions, products);
    });
  </script>
</body>
</html>
