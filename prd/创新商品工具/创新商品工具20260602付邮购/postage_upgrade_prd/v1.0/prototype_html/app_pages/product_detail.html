<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品详情</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f8f9fb; margin:0; padding:16px; }
    .page { max-width: 420px; margin: 0 auto; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,0.08); }
    .header { padding:20px; border-bottom:1px solid #eef0f3; }
    .header h1 { margin:0; font-size:20px; color:#111; }
    .tag { font-size:12px; color:#888; margin-top:8px; }
    .section { padding:16px; border-bottom:1px solid #eef0f3; }
    .section h2 { margin:0 0 12px; font-size:16px; color:#111; }
    .option { padding:14px 16px; border:1px solid #f0f0f5; border-radius:14px; margin-bottom:12px; cursor:pointer; }
    .option.active { border-color:#111; background:#fafafa; }
    .option-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .option-label { font-weight:600; color:#111; }
    .option-sub { font-size:13px; color:#666; }
    .price-row { display:flex; justify-content:space-between; margin:8px 0; }
    .total { display:flex; justify-content:space-between; margin-top:16px; font-weight:600; font-size:18px; }
    .button { display:inline-flex; align-items:center; justify-content:center; width:100%; padding:12px 0; margin-top:16px; border-radius:12px; background:#111; color:#fff; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>小芒定制付邮购</h1>
      <p class="tag">选择基础款或升款 SKU，费用即时显示。</p>
    </div>
    <div class="section">
      <h2>选择 SKU</h2>
      <div class="option active">
        <div class="option-title"><span class="option-label">基础款 SKU</span><span>¥9.00</span></div>
        <div class="option-sub">基础商品价格 0 元 + 运费 9.00 元</div>
      </div>
      <div class="option">
        <div class="option-title"><span class="option-label">升款服务：挂钩</span><span>¥13.00</span></div>
        <div class="option-sub">升款服务 4.00 元 + 运费 9.00 元</div>
      </div>
      <div class="option">
        <div class="option-title"><span class="option-label">升款服务：冰箱贴</span><span>¥14.00</span></div>
        <div class="option-sub">升款服务 5.00 元 + 运费 9.00 元</div>
      </div>
    </div>
    <div class="section">
      <h2>费用明细</h2>
      <div class="price-row"><span>升款服务</span><span>¥4.00</span></div>
      <div class="price-row"><span>运费</span><span>¥9.00</span></div>
      <div class="total"><span>总价</span><span>¥13.00</span></div>
      <a class="button" href="order_detail.html">去下单</a>
    </div>
  </div>
</body>
</html>
