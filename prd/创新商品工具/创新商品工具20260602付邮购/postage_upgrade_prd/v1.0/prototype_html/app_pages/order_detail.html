<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单详情</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f8f9fb; margin:0; padding:16px; }
    .page { max-width: 420px; margin: 0 auto; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,0.08); }
    .header { padding:20px; border-bottom:1px solid #eef0f3; }
    .header h1 { margin:0; font-size:20px; color:#111; }
    .tag { font-size:12px; color:#888; margin-top:8px; }
    .section { padding:16px; }
    .field { display:flex; justify-content:space-between; margin:12px 0; color:#333; }
    .field-label { color:#666; }
    .total { display:flex; justify-content:space-between; margin-top:20px; font-weight:700; font-size:18px; }
    .notice { margin-top:20px; padding:14px; background:#f4f8ff; border-left:4px solid #4e82ff; color:#2d4f9f; border-radius:12px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>订单详情</h1>
      <p class="tag">订单已生成，费用清晰区分升款服务与运费。</p>
    </div>
    <div class="section">
      <div class="field"><div class="field-label">商品名称</div><div>挂绳付邮购</div></div>
      <div class="field"><div class="field-label">选中 SKU</div><div>升款服务：挂钩</div></div>
      <div class="field"><div class="field-label">升款服务</div><div>¥4.00</div></div>
      <div class="field"><div class="field-label">运费</div><div>¥9.00</div></div>
      <div class="field total"><div>实付总价</div><div>¥13.00</div></div>
    </div>
    <div class="section">
      <div class="field"><div class="field-label">收货方式</div><div>付邮配送</div></div>
      <div class="field"><div class="field-label">订单号</div><div>20260602-0001</div></div>
    </div>
    <div class="notice">如果未填写 SPU 底价，则升款服务金额不单独展示，整个价格将按旧逻辑计入运费。</div>
  </div>
</body>
</html>
