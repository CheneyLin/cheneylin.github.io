<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>订单管理 - 付邮购</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:20px;background:#f6f8fb}
    .container{max-width:1000px;margin:0 auto;background:#fff;padding:16px;border-radius:8px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
    .btn{display:inline-block;padding:6px 10px;background:#0b69ff;color:#fff;border-radius:6px;text-decoration:none}
  </style>
</head>
<body>
  <div class="container">
    <h2>订单列表</h2>
    <table>
      <thead>
        <tr><th>订单号</th><th>商品</th><th>选中 SKU</th><th>升款金额</th><th>运费</th><th>实付</th><th>操作</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>20260602-0001</td>
          <td>挂绳付邮购</td>
          <td>升款：挂钩</td>
          <td>¥4.00</td>
          <td>¥9.00</td>
          <td>¥13.00</td>
          <td><a class="btn" href="#">查看</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
