<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>选择地址</title>
<style>
  :root {
    --primary: #3B9EFF;
    --primary-light: #5CB3FF;
    --bg-light: #F0F9FF;
    --white: #FFFFFF;
    --gray-light: #F5F5F5;
    --gray-text: #999999;
    --text-primary: #333333;
    --text-secondary: #666666;
    --yellow: #FFD700;
    --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
    --radius-md: 12px;
    --radius-full: 24px;
    --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-family);
    background: var(--bg-light);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(180deg, #E8F4FF 0%, var(--bg-light) 100%);
    border-radius: 0 0 30px 30px;
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(0deg, #E8F4FF 0%, transparent 100%);
    border-radius: 30px 30px 0 0;
    z-index: 0;
  }

  .page-header { position: relative; z-index: 1; }
  .address-list { position: relative; z-index: 1; }
  .bottom-bar { z-index: 100; }

  .page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: var(--white);
  }

  .page-header .back {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .page-header .title {
    font-size: 17px;
    font-weight: 700;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .add-btn {
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .address-list { padding: 16px; }

  .address-item {
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    position: relative;
  }

  .address-item:active { opacity: 0.8; }

  .address-item.selected { border: 2px solid var(--yellow); }

  .address-info {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .radio-circle {
    width: 20px;
    height: 20px;
    border: 2px solid var(--gray-text);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .address-item.selected .radio-circle {
    border-color: var(--yellow);
    background: var(--yellow);
  }

  .address-item.selected .radio-circle::after {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--text-primary);
    border-radius: 50%;
  }

  .address-content { flex: 1; }

  .address-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .address-contact {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .address-phone {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .address-detail {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .default-tag {
    position: absolute;
    top: 0;
    right: 0;
    font-size: 10px;
    color: var(--white);
    background: var(--text-primary);
    padding: 2px 8px;
    border-radius: 0 var(--radius-md) 0 8px;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--white);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
    display: flex;
    justify-content: center;
    z-index: 100;
  }

  .confirm-btn {
    width: 100%;
    padding: 14px 0;
    background: var(--yellow);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-full);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="back" onclick="goBack()">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>
  <div class="title">选择地址</div>
  <div class="add-btn" onclick="goToAddAddress()">添加新地址</div>
</div>

<div class="address-list" id="addressList"></div>

<div class="bottom-bar">
  <button class="confirm-btn" onclick="confirmSelection()">提交修改</button>
</div>

<script>
let addresses = [
  { id: 1, contact: '小皮球', phone: '18787654567', province: '广东省', city: '深圳市', district: '南山区', street: '南山街道月亮湾泛海城市广场A1栋1228室', isDefault: false },
  { id: 2, contact: '小皮球', phone: '18787654567', province: '湖南省', city: '益阳市', district: '冷水江市', street: '张家楼镇刘家草泊12号楼8单元201号', isDefault: false },
  { id: 3, contact: '小皮球', phone: '18787654567', province: '湖南省', city: '益阳市', district: '王堇庄乡', street: '车庄子村123-43号', isDefault: false },
  { id: 4, contact: '小皮球', phone: '18787654567', province: '黑龙江省', city: '牡丹江市', district: '砂河镇', street: '泉沟村1号楼13单元604室', isDefault: false },
];

let selectedId = null;

function renderAddresses() {
  const list = document.getElementById('addressList');
  list.innerHTML = addresses.map(addr => `
    <div class="address-item ${addr.id === selectedId ? 'selected' : ''}" onclick="selectAddress(${addr.id})">
      ${addr.isDefault ? '<div class="default-tag">默认</div>' : ''}
      <div class="address-info">
        <div class="radio-circle"></div>
        <div class="address-content">
          <div class="address-header">
            <span class="address-contact">${addr.contact}</span>
            <span class="address-phone">${addr.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2')}</span>
          </div>
          <div class="address-detail">${addr.province} ${addr.city} ${addr.district} ${addr.street}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function selectAddress(id) {
  selectedId = id;
  renderAddresses();
}

function goBack() { window.history.back(); }

function goToAddAddress() { window.location.href = 'address-add.html'; }

function confirmSelection() {
  if (!selectedId) {
    alert('请选择一个地址');
    return;
  }
  const addr = addresses.find(a => a.id === selectedId);
  localStorage.setItem('selectedAddress', JSON.stringify(addr));
  window.history.back();
}

// 初始化
const saved = localStorage.getItem('selectedAddress');
if (saved) {
  const addr = JSON.parse(saved);
  selectedId = addr.id;
}
renderAddresses();
</script>

</body>
</html>
