<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>确认订单</title>
<style>
  :root {
    --primary: #3B9EFF;
    --primary-light: #5CB3FF;
    --bg-light: #F0F9FF;
    --white: #FFFFFF;
    --gray-light: #F5F5F5;
    --gray-text: #999999;
    --text-primary: #333333;
    --text-secondary: #666666;
    --yellow: #FFD700;
    --blue: #0066CC;
    --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
    --radius-md: 12px;
    --radius-full: 24px;
    --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-family);
    background: var(--bg-light);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(180deg, #E8F4FF 0%, var(--bg-light) 100%);
    border-radius: 0 0 30px 30px;
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(0deg, #E8F4FF 0%, transparent 100%);
    border-radius: 30px 30px 0 0;
    z-index: 0;
  }

  .page-header { position: relative; z-index: 1; }
  .address-card { position: relative; z-index: 1; }
  .shop-section { position: relative; z-index: 1; }
  .order-section { position: relative; z-index: 1; }
  .agreement-bar { position: relative; z-index: 1; }
  .bottom-bar { z-index: 100; }

  .page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: var(--white);
  }

  .page-header .back {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .page-header .title {
    font-size: 17px;
    font-weight: 700;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  /* 地址卡片 */
  .address-card {
    margin: 12px 16px;
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
  }

  .address-card:active { opacity: 0.8; }

  .address-icon {
    width: 24px;
    height: 24px;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .address-info { flex: 1; }

  .address-main {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .address-city {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .address-default {
    font-size: 10px;
    color: var(--white);
    background: var(--text-primary);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .address-detail {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .address-contact {
    font-size: 12px;
    color: var(--gray-text);
  }

  .address-arrow {
    width: 20px;
    height: 20px;
    color: var(--gray-text);
    flex-shrink: 0;
    margin-top: 20px;
  }

  /* 商品列表 */
  .shop-section {
    margin: 12px 16px;
    background: var(--white);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .shop-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--gray-light);
  }

  .shop-icon {
    width: 18px;
    height: 18px;
    color: var(--text-secondary);
  }

  .shop-name {
    font-size: 13px;
    color: var(--text-secondary);
    flex: 1;
  }

  .product-item {
    display: flex;
    gap: 12px;
    padding: 14px;
    border-bottom: 1px solid var(--gray-light);
  }

  .product-item:last-child { border-bottom: none; }

  .product-image {
    width: 60px;
    height: 60px;
    background: var(--gray-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .product-info { flex: 1; min-width: 0; }

  .product-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-price {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .product-qty {
    font-size: 12px;
    color: var(--gray-text);
  }

  /* 订单信息 */
  .order-section {
    margin: 12px 16px;
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 14px;
    box-shadow: var(--shadow-card);
  }

  .order-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }

  .order-row:first-child { padding-top: 0; }

  .order-label { color: var(--text-secondary); }

  .order-value { color: var(--text-primary); }

  .order-value.free { color: var(--primary); font-weight: 600; }

  /* 协议 - 贴底 */
  .agreement-bar {
    margin: 12px 16px 80px;
    background: rgba(255, 215, 0, 0.15);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .agreement-check {
    width: 22px;
    height: 22px;
    background: var(--yellow);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .agreement-check.checked { background: var(--yellow); }

  .agreement-check.checked::after {
    content: '✓';
    font-size: 12px;
    font-weight: bold;
    color: var(--text-primary);
  }

  .agreement-text {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
  }

  .agreement-link {
    color: var(--blue);
    text-decoration: none;
  }

  /* 底部栏 */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--white);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }

  .price-info {
    display: flex;
    flex-direction: column;
  }

  .price-count {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .price-total {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .price-total .amount {
    font-size: 20px;
    font-weight: 900;
    color: var(--primary);
  }

  .submit-btn {
    padding: 14px 36px;
    background: var(--yellow);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-full);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .submit-btn:disabled {
    background: var(--gray-text);
    color: var(--white);
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="back" onclick="goBack()">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>
  <div class="title">确认订单</div>
  <div style="width:32px;"></div>
</div>

<!-- 地址卡片 -->
<div class="address-card" onclick="goToSelectAddress()">
  <svg class="address-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  <div class="address-info">
    <div class="address-main">
      <span class="address-city">广东省 深圳市 南山区</span>
      <span class="address-default">默认地址</span>
    </div>
    <div class="address-detail">南山街道月亮湾泛海城市广场A1栋1228室</div>
    <div class="address-contact">小皮球 187****4567</div>
  </div>
  <svg class="address-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
</div>

<!-- 商品列表 -->
<div class="shop-section">
  <div id="productList"></div>
</div>

<!-- 订单信息 -->
<div class="order-section">
  <div class="order-row">
    <span class="order-label">运费</span>
    <span class="order-value" id="shippingFeeDisplay">¥0</span>
  </div>
</div>

<!-- 协议 -->
<div class="agreement-bar">
  <div class="agreement-check checked" id="agreementCheck" onclick="toggleAgreement()"></div>
  <div class="agreement-text">
    同意<a class="agreement-link" href="#">《xxx协议》</a>
  </div>
</div>

<!-- 底部栏 -->
<div class="bottom-bar">
  <div class="price-info">
    <div class="price-count" id="itemCount">共1件</div>
    <div class="price-total">实付金额 <span class="amount" id="totalAmount">¥89</span></div>
  </div>
  <button class="submit-btn" id="submitBtn" type="button">提交订单</button>
</div>

<!-- Toast 提示 -->
<div id="toast" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:99999;pointer-events:none;"></div>

<script>
let agreementChecked = true;
let selectedItems = [];
let currentAddress = {
  province: '广东省 深圳市 南山区',
  detail: '南山街道月亮湾泛海城市广场A1栋1228室',
  contact: '小皮球',
  phone: '187****4567',
  isDefault: true
};

function getSelectedItems() {
  const data = localStorage.getItem('selectedForShip');
  return data ? JSON.parse(data) : [];
}

function renderProducts() {
  selectedItems = getSelectedItems();
  const list = document.getElementById('productList');

  if (selectedItems.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-text);">暂无商品</div>';
    document.getElementById('itemCount').textContent = '共0件';
    document.getElementById('shippingFeeDisplay').textContent = '¥0';
    document.getElementById('totalAmount').textContent = '¥0';
    return;
  }

  // 按店铺分组（简化处理，都放一个店铺）
  list.innerHTML = selectedItems.map(item => `
    <div class="product-item">
      <div class="product-image">${item.icon}</div>
      <div class="product-info">
        <div class="product-name">${item.name}</div>
        <div class="product-price">¥${item.price || 0}</div>
        <div class="product-qty">x ${item.qty || 1}</div>
      </div>
    </div>
  `).join('');

  // 更新统计 - 价格默认0
  const totalQty = selectedItems.reduce((sum, item) => sum + (item.qty || 1), 0);
  const totalShippingFee = selectedItems.reduce((sum, item) => sum + (item.shippingFee || 0) * (item.qty || 1), 0);

  document.getElementById('itemCount').textContent = `共${totalQty}件`;
  document.getElementById('shippingFeeDisplay').textContent = `¥${totalShippingFee.toFixed(1)}`;
  document.getElementById('totalAmount').textContent = `¥${totalShippingFee.toFixed(1)}`;
}

function toggleAgreement() {
  agreementChecked = !agreementChecked;
  document.getElementById('agreementCheck').classList.toggle('checked', agreementChecked);
}

function goBack() { window.history.back(); }

function goToSelectAddress() { window.location.href = 'address-select.html'; }

function submitOrder() {
  if (!agreementChecked) {
    showToast('请阅读并同意协议');
    return;
  }

  // 保存到邮寄记录
  const records = JSON.parse(localStorage.getItem('shippingRecords') || '[]');
  selectedItems.forEach(item => {
    records.unshift({
      id: Date.now() + Math.random().toString(36).substr(2, 9),
      time: new Date().toLocaleString(),
      ...item
    });
  });
  localStorage.setItem('shippingRecords', JSON.stringify(records));

  // 从寄存柜移除已邮寄的商品
  const lockerItems = JSON.parse(localStorage.getItem('lockerItems') || '[]');
  const remaining = lockerItems.filter(locker =>
    !selectedItems.some(selected => selected.id === locker.id)
  );
  localStorage.setItem('lockerItems', JSON.stringify(remaining));
  localStorage.removeItem('selectedForShip');

  showToast('支付成功');
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(function() {
    toast.style.display = 'none';
  }, 2000);
}

renderProducts();

document.getElementById('submitBtn').onclick = function() {
  submitOrder();
};
</script>

</body>
</html>
