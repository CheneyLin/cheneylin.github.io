<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>寄存柜</title>
<style>
  :root {
    --primary: #3B9EFF;
    --primary-light: #5CB3FF;
    --bg-light: #F0F9FF;
    --white: #FFFFFF;
    --gray-light: #F5F5F5;
    --gray-bg: #F2F2F7;
    --gray-text: #999999;
    --text-primary: #333333;
    --text-secondary: #666666;
    --yellow: #FFD700;
    --yellow-dark: #E6C200;
    --red: #FF4D4F;
    --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-full: 24px;
    --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-family);
    background: var(--gray-bg);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(180deg, #E8F4FF 0%, var(--gray-bg) 100%);
    border-radius: 0 0 30px 30px;
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(0deg, #E8F4FF 0%, transparent 100%);
    border-radius: 30px 30px 0 0;
    z-index: 0;
  }

  .page-header { position: relative; z-index: 10; }
  .filter-section { position: relative; z-index: 100; }
  .warning-banner { position: relative; z-index: 1; }
  .product-list { position: relative; z-index: 1; }
  .bottom-bar { z-index: 100; }

  /* ===== 顶部导航 ===== */
  .page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--white);
    color: var(--text-primary);
    border-bottom: 1px solid var(--gray-light);
  }

  .page-header .back {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .page-header .title {
    font-size: 17px;
    font-weight: 700;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .header-action {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text-primary);
  }

  .header-action .icon { width: 18px; height: 18px; }
  .header-action .label { font-size: 12px; }

  /* ===== 筛选区域 ===== */
  .filter-section {
    background: var(--white);
    padding: 0 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--gray-light);
  }

  .activity-dropdown {
    position: relative;
    z-index: 999;
  }

  .dropdown-trigger {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--gray-light);
    border-radius: 16px;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    max-width: 180px;
  }

  .dropdown-trigger .text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dropdown-trigger .arrow {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--white);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    min-width: 200px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 999;
  }

  .dropdown-menu.show { display: block; }

  .dropdown-menu .menu-title {
    padding: 12px 14px 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    border-bottom: 1px solid var(--gray-light);
  }

  .dropdown-menu .menu-item {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dropdown-menu .menu-item.active {
    color: var(--yellow-dark);
    font-weight: 600;
  }

  /* Tab切换 */
  .tab-group {
    display: flex;
    background: var(--gray-light);
    border-radius: 18px;
    padding: 2px;
  }

  .tab-btn {
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--yellow);
    color: var(--text-primary);
    font-weight: 600;
  }

  /* ===== 提示横幅 ===== */
  .warning-banner {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #FFF7E6;
    font-size: 12px;
    color: var(--red);
  }

  .warning-banner .warn-icon { width: 14px; height: 14px; flex-shrink: 0; }

  /* ===== 商品列表 ===== */
  .product-list { padding: 12px 16px; }

  /* 活动分组 */
  .activity-group {
    margin-bottom: 16px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .group-checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--gray-text);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .group-checkbox.checked {
    background: var(--yellow);
    border-color: var(--yellow);
  }

  .group-checkbox.checked::after {
    content: '✓';
    font-size: 11px;
    font-weight: bold;
    color: var(--text-primary);
  }

  .group-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* 商品卡片 */
  .product-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-card);
  }

  .product-card.expired {
    opacity: 0.7;
  }

  .product-card.expired .card-thumb {
    filter: grayscale(0.6);
  }

  .card-checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--gray-text);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .card-checkbox.checked {
    background: var(--yellow);
    border-color: var(--yellow);
  }

  .card-checkbox.checked::after {
    content: '✓';
    font-size: 11px;
    font-weight: bold;
    color: var(--text-primary);
  }

  .card-checkbox.disabled {
    border-color: var(--gray-light);
    cursor: not-allowed;
  }

  .card-thumb {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--gray-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .card-content {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-status {
    font-size: 11px;
    color: var(--red);
    margin-bottom: 4px;
  }

  .card-status.expired-text {
    color: var(--gray-text);
  }

  /* 右侧操作区 */
  .card-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .card-ship-info {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* 数量选择器 */
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .qty-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--gray-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    background: var(--white);
  }

  .qty-btn:first-child { border-radius: 4px 0 0 4px; }
  .qty-btn:last-child { border-radius: 0 4px 4px 0; }
  .qty-btn:active { background: var(--gray-light); }

  .qty-value {
    width: 32px;
    height: 24px;
    border-top: 1px solid var(--gray-text);
    border-bottom: 1px solid var(--gray-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ===== 底部结算栏 ===== */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--white);
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }

  .select-all {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .select-all.disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .select-all .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--gray-text);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .select-all .checkbox.checked {
    background: var(--yellow);
    border-color: var(--yellow);
  }

  .select-all .checkbox.checked::after {
    content: '✓';
    font-size: 11px;
    font-weight: bold;
    color: var(--text-primary);
  }

  .select-all .label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .price-info {
    flex: 1;
    text-align: right;
  }

  .price-info .count {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .price-info .count em {
    font-style: normal;
    color: var(--text-primary);
    font-weight: 600;
  }

  .price-info .fee {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .price-info .fee em {
    font-style: normal;
    color: var(--red);
    font-weight: 700;
  }

  .settle-btn {
    padding: 10px 24px;
    background: var(--yellow);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-full);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }

  .settle-btn:disabled {
    background: var(--gray-text);
    color: var(--white);
    cursor: not-allowed;
  }

  /* ===== 空状态 ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-text);
  }

  .empty-state .icon { font-size: 60px; margin-bottom: 16px; }
  .empty-state .text { font-size: 14px; }

</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="page-header">
  <div class="back" onclick="goBack()">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>
  <div class="title">寄存柜</div>
  <div class="header-action" onclick="goToShippingRecords()">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
    <span class="label">邮寄订单</span>
  </div>
</div>

<!-- 筛选区域 -->
<div class="filter-section">
  <div class="activity-dropdown">
    <div class="dropdown-trigger" onclick="toggleDropdown()">
      <span class="text" id="activityText">全部活动</span>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="dropdown-menu" id="dropdownMenu">
      <div class="menu-title">全部活动</div>
      <div class="menu-item active" onclick="selectActivity('all', '全部活动')">全部活动</div>
      <div class="menu-item" onclick="selectActivity('a1', '夏季清凉福袋活动')">夏季清凉福袋活动</div>
      <div class="menu-item" onclick="selectActivity('a2', '卡牌活动活动活动1')">卡牌活动活动活动1</div>
      <div class="menu-item" onclick="selectActivity('a3', '卡牌活动活动活动2')">卡牌活动活动活动2</div>
      <div class="menu-item" onclick="selectActivity('a4', '卡牌活动活动活动3')">卡牌活动活动活动3</div>
    </div>
  </div>
  <div class="tab-group">
    <div class="tab-btn active" data-tab="shippable" onclick="switchTab('shippable')">可邮寄</div>
    <div class="tab-btn" data-tab="expired" onclick="switchTab('expired')">已过期</div>
  </div>
</div>

<!-- 提示横幅 -->
<div class="warning-banner" id="warningBanner">
  <svg class="warn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <span>需在指定日期前寄出，过期将不能邮寄</span>
</div>

<!-- 商品列表 -->
<div class="product-list" id="productList"></div>

<!-- 底部结算栏 -->
<div class="bottom-bar">
  <div class="select-all ${currentTab === 'expired' ? 'disabled' : ''}" onclick="${currentTab === 'expired' ? '' : 'toggleSelectAll()'}">
    <div class="checkbox" id="selectAllCheckbox"></div>
    <span class="label">全选</span>
  </div>
  <div class="price-info">
    <div class="count">已选<em id="selectedCount">0</em>件，邮费合计:<em id="shippingFee">¥0</em></div>
  </div>
  <button class="settle-btn" id="settleBtn" onclick="goToSettle()" disabled>邮寄</button>
</div>

<script>
// ===== 模拟数据 =====
const lockerData = [
  {
    activityId: 'a1',
    activityName: '夏季清凉福袋活动',
    items: [
      { id: 101, name: '白色T恤男款纯棉短袖夏季薄款', icon: '👕', qty: 5, shippable: 1, daysLeft: 90, shippingFee: 12, selected: false },
      { id: 102, name: '运动短裤透气速干跑步裤', icon: '🩳', qty: 1, shippable: 1, daysLeft: 90, shippingFee: 12, selected: false },
      { id: 103, name: '防晒衣轻薄透气女款短款', icon: '🧥', qty: 1, shippable: 1, daysLeft: 45, shippingFee: 12, selected: false },
    ]
  },
  {
    activityId: 'a2',
    activityName: '卡牌活动活动活动1',
    items: [
      { id: 201, name: '卡牌名称名称名称只展示一行略', icon: '🃏', qty: 1, shippable: 1, daysLeft: 30, shippingFee: 15, selected: false },
      { id: 202, name: '卡牌名称名称名称只展示一行略', icon: '🃏', qty: 1, shippable: 1, daysLeft: 15, shippingFee: 15, selected: false },
    ]
  },
  {
    activityId: 'a3',
    activityName: '卡牌活动活动活动2',
    items: [
      { id: 301, name: '商品标题标题标题标只展示一行略', icon: '🎴', qty: 1, shippable: 1, daysLeft: 5, shippingFee: 18, selected: false },
    ]
  },
  {
    activityId: 'a4',
    activityName: '卡牌活动活动活动3',
    items: [
      { id: 401, name: '商品标题标题标题标只展示一行略', icon: '🀄', qty: 1, shippable: 0, daysLeft: -10, shippingFee: 0, selected: false },
      { id: 402, name: '商品标题标题标题标只展示一行略', icon: '🀄', qty: 1, shippable: 0, daysLeft: -30, shippingFee: 0, selected: false },
    ]
  }
];

let currentTab = 'shippable';
let currentActivity = 'all';

// ===== 渲染列表 =====
function renderList() {
  const container = document.getElementById('productList');
  const banner = document.getElementById('warningBanner');

  // 按活动筛选
  let groups = currentActivity === 'all' 
    ? lockerData 
    : lockerData.filter(g => g.activityId === currentActivity);

  // 按tab筛选
  groups = groups.map(group => ({
    ...group,
    items: currentTab === 'shippable' 
      ? group.items.filter(item => item.shippable)
      : group.items.filter(item => !item.shippable)
  })).filter(group => group.items.length > 0);

  // 显示/隐藏提示
  banner.style.display = currentTab === 'shippable' ? 'flex' : 'none';

  if (groups.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📦</div>
        <div class="text">${currentTab === 'shippable' ? '暂无可邮寄商品' : '暂无已过期商品'}</div>
      </div>
    `;
    updateBottom();
    return;
  }

  container.innerHTML = groups.map(group => {
    const allSelected = group.items.every(item => item.selected);
    const someSelected = group.items.some(item => item.selected);
    const isExpiredTab = currentTab === 'expired';

    return `
      <div class="activity-group">
        <div class="group-header">
          <div class="group-checkbox ${isExpiredTab ? 'disabled' : ''} ${allSelected ? 'checked' : ''}"
               onclick="${isExpiredTab ? '' : `toggleGroup('${group.activityId}')`}"></div>
          <div class="group-name">${group.activityName}</div>
        </div>
        ${group.items.map(item => renderCard(item, group.activityId)).join('')}
      </div>
    `;
  }).join('');

  updateBottom();
}

function renderCard(item, activityId) {
  const isExpired = !item.shippable;
  return `
    <div class="product-card ${isExpired ? 'expired' : ''}">
      <div class="card-checkbox ${isExpired ? 'disabled' : ''} ${item.selected ? 'checked' : ''}"
           onclick="${isExpired ? `showToast('已过期商品无法邮寄')` : `toggleItem(${item.id})`}"></div>
      <div class="card-thumb">${item.icon}</div>
      <div class="card-content">
        <div class="card-info">
          <div class="card-title">${item.name}</div>
          ${isExpired 
            ? '<div class="card-status expired-text">已过期无法邮寄</div>'
            : `<div class="card-status">${item.daysLeft}天后将无法邮寄</div>`
          }
        </div>
        ${!isExpired ? `
          <div class="card-actions">
            <div class="card-ship-info">${item.shippable}件可发货</div>
            <div class="qty-control">
              <div class="qty-btn" onclick="changeQty(${item.id}, -1)">−</div>
              <div class="qty-value">${item.qty}</div>
              <div class="qty-btn" onclick="changeQty(${item.id}, 1)">+</div>
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

// ===== 交互逻辑 =====
function toggleItem(itemId) {
  for (const group of lockerData) {
    const item = group.items.find(i => i.id === itemId);
    if (item) {
      item.selected = !item.selected;
      break;
    }
  }
  renderList();
}

function toggleGroup(activityId) {
  const group = lockerData.find(g => g.activityId === activityId);
  if (!group) return;
  const allSelected = group.items.every(i => i.selected);
  group.items.forEach(item => { item.selected = !allSelected; });
  renderList();
}

function toggleSelectAll() {
  const allItems = getAllCurrentItems();
  const allSelected = allItems.every(i => i.selected);
  allItems.forEach(item => { item.selected = !allSelected; });
  renderList();
}

function changeQty(itemId, delta) {
  for (const group of lockerData) {
    const item = group.items.find(i => i.id === itemId);
    if (item) {
      item.qty = Math.max(1, Math.min(item.shippable, item.qty + delta));
      break;
    }
  }
  renderList();
}

function getAllCurrentItems() {
  let groups = currentActivity === 'all' 
    ? lockerData 
    : lockerData.filter(g => g.activityId === currentActivity);
  groups = groups.map(group => ({
    ...group,
    items: currentTab === 'shippable' 
      ? group.items.filter(item => item.shippable)
      : group.items.filter(item => !item.shippable)
  }));
  return groups.flatMap(g => g.items);
}

// ===== 底部栏更新 =====
function updateBottom() {
  const items = getAllCurrentItems();
  const selected = items.filter(i => i.selected);
  const count = selected.reduce((sum, i) => sum + i.qty, 0);
  const fee = selected.reduce((sum, i) => sum + i.shippingFee * i.qty, 0);
  const allSelected = items.length > 0 && items.every(i => i.selected);

  document.getElementById('selectedCount').textContent = count;
  document.getElementById('shippingFee').textContent = `¥${fee.toFixed(1)}`;
  document.getElementById('settleBtn').disabled = count === 0;

  const checkbox = document.getElementById('selectAllCheckbox');
  checkbox.classList.toggle('checked', allSelected);
}

// ===== Tab切换 =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  renderList();
}

// ===== 活动下拉 =====
function toggleDropdown() {
  const menu = document.getElementById('dropdownMenu');
  const isOpen = menu.classList.contains('show');
  menu.classList.toggle('show', !isOpen);
}

function closeDropdown() {
  document.getElementById('dropdownMenu').classList.remove('show');
}

function selectActivity(id, name) {
  currentActivity = id;
  document.getElementById('activityText').textContent = name;
  document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
  event.target.classList.add('active');
  closeDropdown();
  renderList();
}

// ===== 跳转 =====
function goBack() { window.location.href = 'index.html'; }
function goToShippingRecords() { window.location.href = 'shipping-records.html'; }

function goToSettle() {
  const items = getAllCurrentItems().filter(i => i.selected);
  if (items.length === 0) return;
  localStorage.setItem('selectedForShip', JSON.stringify(items));
  window.location.href = 'order-confirm.html';
}

// ===== Toast提示 =====
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:99999;pointer-events:none;display:none;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(function() { toast.style.display = 'none'; }, 1500);
}

// ===== 初始化 =====
renderList();
</script>
