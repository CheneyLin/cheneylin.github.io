<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子吧唧 1.1 - App 完整原型</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #1a1a1a;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        /* 固定控制按钮 */
        .fixed-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 1rem;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
        }
        
        .control-btn.active {
            background: linear-gradient(135deg, #00b894, #00a884);
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }
        
        /* 头部标题 */
        .header-title {
            text-align: center;
            margin-bottom: 2rem;
            padding: 0 2rem;
            padding-top: 2rem;
        }
        
        .header-title h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        
        .header-title p {
            color: #a0a0a0;
            font-size: 1rem;
        }
        
        /* 手机原型统一尺寸 */
        :root {
            --phone-width: 375px;
            --phone-height: 812px;
        }

        /* 平铺容器 */
        .prototype-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--phone-width), 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 100%;
            margin: 0 auto;
            transition: all 0.5s ease;
        }
        
        /* 平铺容器 - 全局视图模式 */
        .prototype-container.global-view {
            grid-template-columns: repeat(auto-fill, minmax(var(--phone-width), 1fr));
            gap: 2rem;
            max-width: none;
            padding: 2rem;
        }
        
        /* 全局视图 - 显示所有页面 */
        .prototype-container.global-view .page-section {
            display: block !important;
            opacity: 1;
            transform: none;
        }
        
        /* 手机框架 */
        .phone-frame {
            width: var(--phone-width);
            height: var(--phone-height);
            background: #f8f9fa;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            border: 12px solid #1a1a1a;
        }
        
        .phone-frame.highlighted {
            border-color: #6c5ce7;
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.6);
            transform: scale(1.02);
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 0 0 20px 20px;
            z-index: 50;
        }
        
        .status-bar {
            height: 44px;
            background: #fff;
            position: relative;
            padding: 0 16px;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        /* 页面内容容器 */
        .page-content {
            height: calc(var(--phone-height) - 44px);
            overflow-y: auto;
            position: relative;
        }
        
        /* 隐藏滚动条但保留功能 */
        .page-content::-webkit-scrollbar {
            width: 0;
            display: none;
        }
        
        /* 标签页 */
        .tabs {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            padding: 1rem 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s ease;
            flex-wrap: wrap;
        }
        
        /* 全局视图时隐藏标签页 */
        .tabs.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-100%);
        }
        
        .tab-btn {
            background: #333;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #6c5ce7;
            transform: scale(1.05);
        }
        
        .tab-btn:hover {
            background: #5b4cc4;
        }
        
        /* 页面显示控制 */
        .page-section {
            display: none;
        }
        
        .page-section.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        /* 全局视图时移除高亮效果 */
        .prototype-container.global-view .phone-frame.highlighted {
            border-color: #1a1a1a;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            transform: none;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #5b4cc4;
        }
        
        /* 高亮模块 */
        .feature-highlight {
            border: 2px solid #ff4d4f !important;
            box-shadow: 0 0 0 4px rgba(255, 77, 79, 0.2);
            transition: all 0.3s;
        }
        
        .prototype-module {
            transition: all 0.3s;
        }

        /* 页面特定样式 */
        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        .nav-back { position: absolute; left: 15px; font-size: 20px; cursor: pointer; color: #333; }
        .nav-title { font-weight: 600; font-size: 17px; }

        .header-info {
            background: #fff;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: #e9ecef; }
        .user-meta { flex: 1; }
        .user-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .device-name { font-size: 12px; color: #868e96; }
        
        .action-area { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .status-connected { color: #00b894; font-size: 12px; font-weight: 500; }
        .import-btn {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tabs-content {
            display: flex;
            background: #fff;
            margin-top: 10px;
            border-bottom: 1px solid #eee;
        }
        .tab-item { flex: 1; text-align: center; padding: 12px 0; font-weight: 500; color: #adb5bd; cursor: pointer; }
        .tab-item.active { color: #6c5ce7; border-bottom: 2px solid #6c5ce7; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .badge-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #e9ecef;
            margin: 0 auto 12px;
            overflow: hidden;
        }
        .badge-img img { width: 100%; height: 100%; object-fit: cover; }
        .badge-name { font-size: 13px; color: #495057; font-weight: 500; }

        /* 模态框样式 */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-box {
            background: #fff;
            width: 85%;
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
        }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
        .modal-text { font-size: 14px; color: #636e72; margin-bottom: 24px; line-height: 1.6; text-align: left; background: #f8f9fa; padding: 16px; border-radius: 10px; }
        .checkbox-group { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 24px; 
            text-align: left; 
            font-size: 13px; 
            color: #2d3436; 
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .checkbox-group input { margin-right: 10px; margin-top: 2px; width: 18px; height: 18px; accent-color: #6c5ce7; }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #6c5ce7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:disabled { background: #dfe6e9; color: #b2bec3; cursor: not-allowed; }
        
        .btn-cancel {
            margin-top: 12px;
            background: transparent;
            border: none;
            color: #b2bec3;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            padding: 8px;
        }

        /* 裁剪页样式 */
        .crop-container {
            height: calc(100% - 88px);
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .crop-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .crop-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .crop-square {
            width: 280px;
            height: 280px;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
        }
        .crop-footer {
            padding: 20px;
            display: flex;
            gap: 12px;
            background: #000;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel-crop { background: #333; color: #fff; }
        .btn-confirm-crop { background: #6c5ce7; color: #fff; }

        /* Loading 样式 */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text { color: #333; font-weight: 600; font-size: 16px; }
        .loading-subtext { color: #999; font-size: 12px; margin-top: 8px; }

        /* Toast 样式 */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 固定控制按钮 -->
    <div class="fixed-controls">
        <button class="control-btn active" id="globalViewBtn" onclick="toggleGlobalView()">
            <i class="fas fa-th-large"></i>
            <span>全局视图</span>
        </button>
        <button class="control-btn" onclick="resetToDefault()">
            <i class="fas fa-redo"></i>
            <span>重置</span>
        </button>
    </div>
    
    <!-- 头部标题 -->
    <div class="header-title">
        <h1><i class="fas fa-mobile-alt mr-3"></i>电子吧唧 1.1 - App 原型</h1>
        <p>相册图片导入功能完整流程</p>
    </div>
    
    <!-- 标签页切换 -->
    <div class="tabs" id="tabsContainer">
        <button class="tab-btn active" onclick="showPage('page_home')">
            <i class="fas fa-home mr-2"></i>吧唧背包
        </button>
        <button class="tab-btn" onclick="showPage('page_protocol')">
            <i class="fas fa-shield-alt mr-2"></i>安全协议
        </button>
        <button class="tab-btn" onclick="showPage('page_crop')">
            <i class="fas fa-crop-alt mr-2"></i>图片裁剪
        </button>
        <button class="tab-btn" onclick="showPage('page_loading')">
            <i class="fas fa-spinner mr-2"></i>传输中
        </button>
    </div>

    <!-- 页面容器 -->
    <div class="prototype-container global-view" id="prototypeContainer">
        
        <!-- 页面 1: 吧唧背包主页 (对应 PRD: feature_import_entry) -->
        <div id="page_home" class="phone-frame page-section active prototype-module" data-prototype="feature_import_entry">
            <div class="phone-notch"></div>
            <div class="status-bar">
                <span>9:41</span>
                <div class="flex items-center gap-2">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <div class="page-content">
                <div class="nav-bar">
                    <div class="nav-title">吧唧背包</div>
                </div>
                
                <div class="header-info">
                    <div class="user-info">
                        <div class="user-avatar"></div>
                        <div class="user-meta">
                            <div class="user-name">用昵称的上限是十二个字符</div>
                            <div class="device-name">设备名称显示显示显示 ›</div>
                        </div>
                    </div>
                    <div class="action-area">
                        <span class="status-connected">已连接</span>
                        <button class="import-btn" onclick="navigateTo('page_protocol')">
                            <span>+</span> 导入图片
                        </button>
                    </div>
                </div>

                <div class="tabs-content">
                    <div class="tab-item active">已拥有 (123)</div>
                    <div class="tab-item">待解锁</div>
                </div>

                <div class="grid">
                    <div class="card"><div class="badge-img"><img src="https://via.placeholder.com/120/ff7675/fff?text=1" alt=""></div><div class="badge-name">吧唧的名称名称</div></div>
                    <div class="card"><div class="badge-img"><img src="https://via.placeholder.com/120/74b9ff/fff?text=2" alt=""></div><div class="badge-name">吧唧的名称名称</div></div>
                    <div class="card"><div class="badge-img"><img src="https://via.placeholder.com/120/55efc4/fff?text=3" alt=""></div><div class="badge-name">吧唧的名称名称</div></div>
                    <div class="card"><div class="badge-img"><img src="https://via.placeholder.com/120/a29bfe/fff?text=4" alt=""></div><div class="badge-name">吧唧的名称名称</div></div>
                </div>
            </div>
        </div>

        <!-- 页面 2: 安全协议弹窗 (对应 PRD: feature_security_agreement) -->
        <div id="page_protocol" class="phone-frame page-section prototype-module" data-prototype="feature_security_agreement">
            <div class="phone-notch"></div>
            <div class="status-bar">
                <span>9:41</span>
                <div class="flex items-center gap-2">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <div class="page-content" style="background: #f8f9fa;">
                <!-- 背景模糊层 -->
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('https://via.placeholder.com/375x812/eee/ccc?text=背包页') center/cover; filter: blur(8px); opacity: 0.5;"></div>
                
                <!-- 模态框 -->
                <div style="position: relative; z-index: 10; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px;">
                    <div class="modal-box">
                        <div style="width: 50px; height: 50px; background: #ffeaa7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px;">🛡️</div>
                        <div class="modal-title">信息安全约定</div>
                        <div class="modal-text">
                            为了维护良好的网络环境，请您承诺：<br>
                            1. 上传的图片不包含任何违规、侵权及不良信息。<br>
                            2. 图片仅作为个人收藏使用，不进行公开传播。<br>
                            3. 若因上传内容产生法律纠纷，由您自行承担。
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="agree_check" onchange="toggleBtn()">
                            <label for="agree_check">我已阅读并同意上述约定</label>
                        </div>
                        <button id="btn_agree" class="btn-primary" disabled onclick="navigateTo('page_crop')">确认并继续</button>
                        <button class="btn-cancel" onclick="navigateTo('page_home')">暂不导入</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面 3: 图片裁剪页 (对应 PRD: feature_image_crop) -->
        <div id="page_crop" class="phone-frame page-section prototype-module" data-prototype="feature_image_crop">
            <div class="phone-notch"></div>
            <div class="status-bar" style="background: rgba(0,0,0,0.8); color: #fff;">
                <span>9:41</span>
                <div class="flex items-center gap-2">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <div class="page-content" style="padding: 0;">
                <div class="nav-bar" style="background: rgba(0,0,0,0.8); color: #fff;">
                    <div class="nav-back" onclick="navigateTo('page_home')" style="color: #fff;">✕</div>
                    <div class="nav-title">裁剪图片</div>
                    <div style="width: 20px;"></div>
                </div>
                
                <div class="crop-container">
                    <img class="crop-image" src="https://via.placeholder.com/400x600/333/666?text=Selected+Image" alt="">
                    <div class="crop-overlay">
                        <div class="crop-square"></div>
                    </div>
                </div>
                
                <div class="crop-footer">
                    <button class="btn btn-cancel-crop" onclick="navigateTo('page_home')">返回</button>
                    <button class="btn btn-confirm-crop" onclick="navigateTo('page_loading')">确认导入</button>
                </div>
            </div>
        </div>

        <!-- 页面 4: 传输中 Loading (对应 PRD: feature_transfer_logic) -->
        <div id="page_loading" class="phone-frame page-section prototype-module" data-prototype="feature_transfer_logic">
            <div class="phone-notch"></div>
            <div class="status-bar">
                <span>9:41</span>
                <div class="flex items-center gap-2">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <div class="page-content" style="background: #f8f9fa;">
                <div class="nav-bar">
                    <div class="nav-back" onclick="navigateTo('page_home')" style="color: #333;">‹</div>
                    <div class="nav-title">导入进度</div>
                    <div style="width: 20px;"></div>
                </div>
                
                <div class="loading-overlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在导入设备...</div>
                    <div class="loading-subtext">请保持设备连接</div>
                </div>
                
                <!-- Toast 提示 -->
                <div id="toast_success" class="toast" style="display: none;">导入成功</div>
                <div id="toast_fail" class="toast" style="display: none;">传输失败，请重试</div>
            </div>
        </div>

    </div>

    <script>
        // 全局视图状态
        let isGlobalView = true;
        
        // 切换全局视图
        function toggleGlobalView() {
            const container = document.getElementById('prototypeContainer');
            const tabs = document.getElementById('tabsContainer');
            const btn = document.getElementById('globalViewBtn');
            
            isGlobalView = !isGlobalView;
            
            if (isGlobalView) {
                container.classList.add('global-view');
                tabs.classList.add('hidden');
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-th-large"></i><span>全局视图</span>';
                
                document.querySelectorAll('.page-section').forEach(section => {
                    section.style.display = 'block';
                });
                
                document.querySelectorAll('.phone-frame').forEach(frame => {
                    frame.classList.remove('highlighted');
                });
                
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            } else {
                container.classList.remove('global-view');
                tabs.classList.remove('hidden');
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-th-large"></i><span>单页视图</span>';
                
                document.querySelectorAll('.page-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                showPage('page_home');
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 重置到默认状态
        function resetToDefault() {
            const container = document.getElementById('prototypeContainer');
            const tabs = document.getElementById('tabsContainer');
            const btn = document.getElementById('globalViewBtn');
            
            isGlobalView = true;
            container.classList.add('global-view');
            tabs.classList.add('hidden');
            btn.classList.add('active');
            btn.innerHTML = '<i class="fas fa-th-large"></i><span>全局视图</span>';
            
            document.querySelectorAll('.page-section').forEach(section => {
                section.style.display = 'block';
            });
            
            document.querySelectorAll('.phone-frame').forEach(frame => {
                frame.classList.remove('highlighted');
            });
            
            history.pushState('', document.title, window.location.pathname + window.location.search);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 显示指定页面
        function showPage(pageId) {
            if (isGlobalView) {
                toggleGlobalView();
                setTimeout(() => {
                    performShowPage(pageId);
                }, 300);
            } else {
                performShowPage(pageId);
            }
        }
        
        // 执行页面显示
        function performShowPage(pageId) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
                section.style.display = 'none';
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            const targetSection = document.getElementById(pageId);
            if (targetSection) {
                targetSection.style.display = 'block';
                targetSection.classList.add('active');
                
                document.querySelectorAll('.phone-frame').forEach(frame => {
                    frame.classList.remove('highlighted');
                });
                targetSection.classList.add('highlighted');
                
                const pageIds = ['page_home', 'page_protocol', 'page_crop', 'page_loading'];
                const tabIndex = pageIds.indexOf(pageId);
                if (tabIndex !== -1) {
                    document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');
                }
                
                window.location.hash = pageId;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        // 页面导航
        function navigateTo(pageId) {
            showPage(pageId);
        }

        // 安全协议勾选逻辑
        function toggleBtn() {
            const checked = document.getElementById('agree_check').checked;
            document.getElementById('btn_agree').disabled = !checked;
        }
        
        // 接收主控文档联动指令
        window.addEventListener('message', function(e) {
            if (e.data.action === 'highlight' && e.data.featureId) {
                document.querySelectorAll('.prototype-module').forEach(module => {
                    module.classList.remove('feature-highlight');
                });
                
                const targetModule = document.querySelector(`.prototype-module[data-prototype="${e.data.featureId}"]`);
                if (targetModule) {
                    const pageSection = targetModule.closest('.page-section');
                    if (pageSection && !isGlobalView) {
                        const pageId = pageSection.id;
                        performShowPage(pageId);
                    }

                    targetModule.classList.add('feature-highlight');
                    targetModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
            
            if (e.data.action === 'navigate' && e.data.pageId) {
                showPage(e.data.pageId);
            }
        });
        
        // 页面加载时检查 URL 锚点
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            const validPages = ['page_home', 'page_protocol', 'page_crop', 'page_loading'];
            
            if (hash && validPages.includes(hash)) {
                isGlobalView = false;
                document.getElementById('prototypeContainer').classList.remove('global-view');
                document.getElementById('tabsContainer').classList.remove('hidden');
                document.getElementById('globalViewBtn').classList.remove('active');
                document.getElementById('globalViewBtn').innerHTML = '<i class="fas fa-th-large"></i><span>单页视图</span>';
                
                document.querySelectorAll('.page-section').forEach(section => {
                    section.style.display = 'none';
                    section.classList.remove('active');
                });
                
                setTimeout(() => {
                    performShowPage(hash);
                }, 100);
            } else {
                isGlobalView = true;
                document.getElementById('prototypeContainer').classList.add('global-view');
                document.getElementById('tabsContainer').classList.add('hidden');
                
                document.querySelectorAll('.page-section').forEach(section => {
                    section.style.display = 'block';
                    section.classList.add('active');
                });
            }
        });
        
        // 监听 hash 变化
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            const validPages = ['page_home', 'page_protocol', 'page_crop', 'page_loading'];
            
            if (hash && validPages.includes(hash)) {
                if (isGlobalView) {
                    toggleGlobalView();
                    setTimeout(() => {
                        performShowPage(hash);
                    }, 300);
                } else {
                    performShowPage(hash);
                }
            }
        });
    </script>
</body>
</html>
