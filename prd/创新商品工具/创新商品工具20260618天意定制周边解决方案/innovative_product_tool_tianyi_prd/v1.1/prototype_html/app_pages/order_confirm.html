<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单确认 - 天意定制</title>
    <link href="../../../assets/bootstrap.main.css" rel="stylesheet" />
    <link href="../../../assets/bootstrap-icons.css" rel="stylesheet" />
    <link href="../../../style/main.css" rel="stylesheet" />
    <link href="../../../style/app-styles.css" rel="stylesheet" />
    <style>
        .custom-preview-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: white;
            margin-bottom: 16px;
        }
        .preview-placeholder {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            backdrop-filter: blur(10px);
        }
        .order-item {
            background: var(--geist-gray-50);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--geist-gray-100);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: var(--geist-gray-500);
            font-size: 14px;
        }
        .info-value {
            color: var(--geist-black);
            font-weight: 600;
            font-size: 14px;
        }
        .price-row .info-value {
            color: var(--ship-red);
            font-size: 18px;
            font-weight: 800;
        }
        .info-row:last-child {
            background: var(--geist-white);
            border: 1px solid var(--geist-gray-100);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .address-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .address-name {
            font-weight: 700;
            color: var(--geist-black);
            font-size: 15px;
        }
        .address-phone {
            color: var(--geist-gray-500);
            font-size: 14px;
        }
        .address-detail {
            color: var(--geist-gray-600);
            font-size: 13px;
            line-height: 1.6;
        }
        .edit-btn {
            color: var(--develop-blue);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .tag-default {
            background: var(--develop-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .pay-button {
            background: linear-gradient(135deg, var(--ship-red) 0%, #ff6b5a 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pay-button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .pay-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pay-button:disabled:active {
            transform: none;
        }
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--geist-black);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fixed-bottom-bar {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 16px;
            border-top: 1px solid var(--geist-gray-100);
            z-index: 100;
        }
    </style>
</head>
<body style="margin:0;padding:0;">
    <div id="app_order_confirm" class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="flex items-center gap-1">
                <i class="bi bi-reception-4"></i>
                <i class="bi bi-wifi"></i>
                <i class="bi bi-battery-full"></i>
            </div>
        </div>

        <div class="page-content">
            <div class="nav-bar">
                <div class="nav-back cursor-pointer" onclick="navigateToPage('goods_detail.html')">
                    <i class="bi bi-chevron-left"></i>
                </div>
                <div class="nav-title">订单确认</div>
                <div style="width: 24px;"></div>
            </div>

            <div class="p-4">
                <div class="mb-6">
                    <div class="section-title">
                        <i class="bi bi-geo-alt-fill" style="color: var(--develop-blue);"></i>
                        收货地址
                    </div>
                    <div class="address-card">
                        <div class="address-header">
                            <div class="flex items-center">
                                <span class="address-name">林先生</span>
                                <span class="tag-default">默认</span>
                            </div>
                            <span class="edit-btn">
                                <i class="bi bi-pencil"></i> 编辑
                            </span>
                        </div>
                        <div class="address-phone">138****1234</div>
                        <div class="address-detail">湖南省长沙市开福区湖南广电七彩盒子8楼</div>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="section-title">
                        <i class="bi bi-image-fill" style="color: var(--develop-blue);"></i>
                        定制预览
                    </div>
                    <div class="custom-preview-card">
                        <div class="preview-placeholder">
                            <i class="bi bi-star"></i>
                        </div>
                        <div style="font-weight: 700; font-size: 16px; margin-bottom: 4px;">初音未来 2024</div>
                        <div style="font-size: 13px; opacity: 0.9;">定制票根 · 天意定制</div>
                        <div style="margin-top: 12px; font-size: 12px; opacity: 0.8;">
                            <i class="bi bi-check-circle-fill mr-1"></i>天意生产单号：TY-PO-1001
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="section-title">
                        <i class="bi bi-bag-fill" style="color: var(--develop-blue);"></i>
                        商品信息
                    </div>
                    <div class="order-item">
                        <div class="flex gap-3">
                            <div style="width: 80px; height: 80px; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; flex-shrink: 0;">
                                <i class="bi bi-star"></i>
                            </div>
                            <div class="flex-1">
                                <div style="font-weight: 700; color: var(--geist-black); font-size: 14px; margin-bottom: 4px;">初音未来 2024 票根</div>
                                <div style="font-size: 12px; color: var(--geist-gray-500); margin-bottom: 8px;">天意定制票根 · 定制商品</div>
                                <div class="flex justify-between items-center">
                                    <span style="font-weight: 800; color: var(--ship-red); font-size: 16px;">¥128</span>
                                    <span style="color: var(--geist-gray-500); font-size: 13px;">×1</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="section-title">
                        <i class="bi bi-receipt" style="color: var(--develop-blue);"></i>
                        订单信息
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-label">商品金额</span>
                                <span class="info-value">¥128.00</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">运费</span>
                                <span class="info-value">¥0.00</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">制作周期</span>
                                <span class="info-value">7天</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">预计发货</span>
                                <span class="info-value">3天</span>
                            </div>
                            <div class="info-row price-row" style="padding-top: 16px; border-top: 1px dashed var(--geist-gray-200);">
                                <span class="info-label" style="font-weight: 700; color: var(--geist-black);">实付金额</span>
                                <span class="info-value">¥128.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="height: 40px;"></div>
            </div>
        </div>

        <div class="fixed-bottom-bar">
            <div class="flex items-center justify-between">
                <div>
                    <div style="font-size: 12px; color: var(--geist-gray-500); margin-bottom: 2px;">实付金额</div>
                    <div style="font-size: 22px; font-weight: 800; color: var(--ship-red);">¥128.00</div>
                </div>
                <button class="pay-button" onclick="submitOrder()">
                    确认支付
                </button>
            </div>
        </div>
    </div>

    <script>
        function navigateToPage(pageUrl) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'PAGE_NAVIGATION', page: pageUrl }, '*');
            } else {
                window.location.href = pageUrl;
            }
        }

        function submitOrder() {
            showToast('订单提交成功，正在跳转支付...');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.cssText = 'position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.85);color:white;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s ease;z-index:2000;white-space:nowrap;';
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) translateY(0)';
            });
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
    </script>
</body>
</html>
