<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创新商品工具 - 商家后台 v1.1</title>
    <link href="../../assets/bootstrap.main.css" rel="stylesheet" />
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet" />
    <link href="../../style/main.css" rel="stylesheet" />
    <link href="../../style/admin-prototype-styles.css" rel="stylesheet" />
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-shop"></i>
            <span style="margin-left: 8px;">商家后台</span>
        </div>
        <div class="sidebar-menu">
            <div class="menu-group-title">商品管理</div>
            <div class="menu-item active" data-page="goods_list.html" onclick="loadPage('goods_list.html', this)">
                <i class="bi bi-list-ul"></i>
                <span>商品管理</span>
            </div>
            
            <div class="menu-group-title" style="margin-top: 20px;">小芒定制</div>
            <div class="menu-item" data-page="image_set_list.html" onclick="loadPage('image_set_list.html', this)">
                <i class="bi bi-images"></i>
                <span>图集管理</span>
            </div>
            <div class="menu-item" data-page="tianyi_custom.html" onclick="loadPage('tianyi_custom.html', this)">
                <i class="bi bi-link"></i>
                <span>天意定制</span>
            </div>
            
            <div class="menu-group-title" style="margin-top: 20px;">订单管理</div>
            <div class="menu-item" data-page="order_manage.html" onclick="loadPage('order_manage.html', this)">
                <i class="bi bi-file-earmark-text"></i>
                <span>发货登记</span>
            </div>
        </div>
    </div>
    
    <!-- Main Content Area with iframe -->
    <div class="main-content">
        <iframe id="adminFrame" src="admin_pages/goods_list.html" frameborder="0"></iframe>
    </div>

    <script>
        let currentPage = 'goods_list.html';
        
        // 加载页面函数
        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            const frame = document.getElementById('adminFrame');
            frame.src = `admin_pages/${pageUrl}`;
            
            // 更新菜单激活状态
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (element) {
                element.classList.add('active');
            } else {
                // 如果没有传入 element，根据 pageUrl 查找
                const menuItem = document.querySelector(`[data-page="${pageUrl}"]`);
                if (menuItem) {
                    menuItem.classList.add('active');
                }
            }
            
            // 更新 URL hash
            window.location.hash = pageUrl;
        }
        
        // 监听来自子页面的导航消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                if (menuItem) {
                    loadPage(targetPage, menuItem);
                }
            }
        });
        
        // 监听来自父窗口的高亮消息（PRD 联动）
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const featureId = event.data.featureId;
                
                // 映射 featureId 到页面
                let targetPage = null;
                if (featureId.startsWith('admin_feature_01')) {
                    targetPage = 'goods_list.html';
                } else if (featureId.startsWith('admin_feature_02')) {
                    targetPage = 'image_set_list.html';
                } else if (featureId.startsWith('admin_feature_03')) {
                    targetPage = 'tianyi_custom.html';
                } else if (featureId.startsWith('admin_feature_04')) {
                    targetPage = 'order_manage.html';
                }
                
                if (targetPage) {
                    // 切换到对应页面
                    const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                    if (menuItem) {
                        loadPage(targetPage, menuItem);
                        
                        // 转发高亮消息到 iframe
                        setTimeout(() => {
                            const frame = document.getElementById('adminFrame');
                            if (frame && frame.contentWindow) {
                                frame.contentWindow.postMessage({
                                    action: 'highlight',
                                    featureId: featureId
                                }, '*');
                            }
                        }, 300);
                    }
                }
            }
        });
        
        // 处理 URL hash 变化
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
        
        // 页面加载时检查 hash
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
    </script>
</body>
</html>
