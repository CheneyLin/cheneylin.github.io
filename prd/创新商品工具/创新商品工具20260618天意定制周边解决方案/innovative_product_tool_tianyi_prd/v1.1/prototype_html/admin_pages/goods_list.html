<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天意定制商品管理</title>
    <link href="../../../assets/bootstrap.main.css" rel="stylesheet">
    <link href="../../../assets/bootstrap-icons.css" rel="stylesheet">
    <link href="../../../assets/tailwind.min.css" rel="stylesheet">
    <link href="../../../style/main.css" rel="stylesheet">
    <link href="../../../style/admin-styles.css" rel="stylesheet">
</head>
<body>
    <div class="page-header">
        <div class="page-title">天意定制商品管理</div>
    </div>

    <div class="admin-section">
        <div class="admin-section-body">
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" placeholder="搜索商品名称 / 天意SKU">
                    <select>
                        <option value="">全部状态</option>
                        <option value="1">已上架</option>
                        <option value="0">已下架</option>
                    </select>
                    <button class="btn-primary">查询</button>
                    <button class="btn-outline">重置</button>
                </div>
                <div class="toolbar-right">
                    <button class="btn-primary" onclick="openDrawer()">
                        <i class="bi bi-plus-lg"></i> 新增商品
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-section-header">商品列表</div>
        <div class="admin-section-body no-padding">
            <table class="table">
                <thead>
                    <tr>
                        <th>商品ID</th>
                        <th>商品名称</th>
                        <th>关联天意SKU</th>
                        <th>制作周期</th>
                        <th>预计发货</th>
                        <th>状态</th>
                        <th>上架时间</th>
                        <th>已绑定图集</th><th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>SPU20260401001</td>
                        <td>初音未来 2024 票根</td>
                        <td>TNG-0001</td>
                        <td>7天</td>
                        <td>3天</td>
                        <td><span class="badge badge-active">已上架</span></td>
                        <td>2026-04-01</td>
                        <td><span class="badge badge-active">2个</span></td>
                        <td>
                            <button class="btn-action" onclick="openDrawer('初音未来 2024 票根')">编辑</button>
                            <button class="btn-action" onclick="navigateToBind('SPU20260401001', '初音未来 2024 票根')">绑定图集</button>
                            <button class="btn-action danger">下架</button>
                        </td>
                    </tr>
                    <tr>
                        <td>SPU20260405002</td>
                        <td>原神 雷电将军 限定票根</td>
                        <td>TY-20260405002</td>
                        <td>7天</td>
                        <td>3天</td>
                        <td><span class="badge badge-active">已上架</span></td>
                        <td>2026-04-05</td>
                        <td><span class="badge badge-soldout">未绑定</span></td>
                        <td>
                            <button class="btn-action" onclick="openDrawer('原神 雷电将军 限定票根')">编辑</button>
                            <button class="btn-action" onclick="navigateToBind('SPU20260405002', '原神 雷电将军 限定票根')">绑定图集</button>
                            <button class="btn-action danger">下架</button>
                        </td>
                    </tr>
                    <tr>
                        <td>SPU20260320003</td>
                        <td>鬼灭之刃 特别版票根</td>
                        <td>TY-20260320003</td>
                        <td>10天</td>
                        <td>5天</td>
                        <td><span class="badge badge-inactive">已下架</span></td>
                        <td>2026-03-20</td>
                        <td><span class="badge badge-active">1个</span></td>
                        <td>
                            <button class="btn-action" onclick="openDrawer('鬼灭之刃 特别版票根')">编辑</button>
                            <button class="btn-action" onclick="navigateToBind('SPU20260320003', '鬼灭之刃 特别版票根')">绑定图集</button>
                            <button class="btn-action">上架</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <ul class="pagination">
        <li><a href="#">上一页</a></li>
        <li class="active"><a href="#">1</a></li>
        <li><a href="#">2</a></li>
        <li><a href="#">3</a></li>
        <li><a href="#">下一页</a></li>
    </ul>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="drawer-title" id="drawerTitle">编辑商品</div>
            <button class="drawer-close" onclick="closeDrawer()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="drawer-body">
            <div class="admin-section">
                <div class="admin-section-body">
                    <div class="form-section">
                        <div class="form-section-title">基本信息</div>
                        <div class="form-row">
                            <div>
                                <label class="form-label"><span class="text-danger">*</span> 商品名称</label>
                                <input type="text" class="form-control" id="goodsName" value="初音未来 2024 票根">
                            </div>
                            <div>
                                <label class="form-label"><span class="text-danger">*</span> 关联天意SKU</label>
                                <input type="text" class="form-control" id="tianyiSku" value="TNG-0001" placeholder="请输入天意供应商提供的SKU">
                            </div>
                        </div>
                        <div class="form-row">
                            <div>
                                <label class="form-label"><span class="text-danger">*</span> 制作周期（天）</label>
                                <input type="number" class="form-control" id="productionCycle" value="7" placeholder="例如：7">
                            </div>
                            <div>
                                <label class="form-label"><span class="text-danger">*</span> 预计发货天数</label>
                                <input type="number" class="form-control" id="shipEstimate" value="3" placeholder="例如：3">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">商品描述</label>
                            <textarea class="form-control" rows="3" placeholder="请输入商品描述...">初音未来 2024 系列精美票根，采用高品质印刷工艺，支持用户定制。</textarea>
                        </div>
                        <div class="form-row">
                            <div>
                                <label class="form-label">上架时间</label>
                                <input type="datetime-local" class="form-control" value="2026-04-01T00:00">
                            </div>
                            <div>
                                <label class="form-label">下架时间</label>
                                <input type="datetime-local" class="form-control" value="2026-06-30T23:59">
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.08);">
                        <button class="btn-outline" onclick="closeDrawer()">取消</button>
                        <button class="btn-primary" onclick="saveGoods()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let drawerOverlay = document.getElementById('drawerOverlay');
        let drawer = document.getElementById('drawer');
        let drawerTitle = document.getElementById('drawerTitle');
        let goodsNameInput = document.getElementById('goodsName');

        function openDrawer(goodsName) {
            if (goodsName) {
                drawerTitle.textContent = '编辑商品 - ' + goodsName;
                goodsNameInput.value = goodsName;
            } else {
                drawerTitle.textContent = '新增商品';
                goodsNameInput.value = '';
            }
            drawerOverlay.classList.add('show');
            drawer.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawerOverlay.classList.remove('show');
            drawer.classList.remove('show');
            document.body.style.overflow = '';
        }

        function saveGoods() {
            alert('保存成功！');
            closeDrawer();
        }

        function navigateToBind(goodsId, goodsName) {
            window.parent.postMessage({
                type: 'PAGE_NAVIGATION',
                page: 'tianyi_custom.html'
            }, '*');
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                if (targetPage === 'goods_list.html') {
                    closeDrawer();
                }
            }
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeDrawer();
            }
        });
    </script>
</body>
</html>
