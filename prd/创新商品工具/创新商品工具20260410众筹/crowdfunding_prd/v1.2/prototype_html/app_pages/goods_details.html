                badges: [
                    { id: 'badge1', class: 'badge-red', icon: 'bi-lightning-fill', text: '返场特惠' },
                    { id: 'badge2', class: 'badge-green', icon: 'bi-check-circle', text: '奖励继续有效' }
                ]
            }
        };

        function updateUI(state) {
            const config = stateConfig[state];

            document.getElementById('priceValue').textContent = config.priceValue;
            document.getElementById('priceBadge').style.background = config.priceBadge.bg;
            document.getElementById('priceBadgeText').textContent = config.priceBadge.text;
            document.getElementById('timeLabel').textContent = config.timeLabel;
            document.getElementById('timeValue').textContent = config.timeValue;
            document.getElementById('priceHint').textContent = config.priceHint;

            if (config.priceOriginal) {
                document.getElementById('priceOriginal').textContent = config.priceOriginal;
                document.getElementById('priceOriginal').style.display = 'inline';
            } else {
                document.getElementById('priceOriginal').style.display = 'none';
            }

            document.getElementById('originalRow').style.display = config.originalRow ? 'flex' : 'none';

            const statusIcon = document.getElementById('statusIcon');
            statusIcon.className = 'status-icon ' + config.statusIcon.class;
            statusIcon.innerHTML = '<i class="bi ' + config.statusIcon.icon + '"></i>';

            document.getElementById('statusText').textContent = config.statusText;
            document.getElementById('progressData').textContent = config.progressData;
            document.getElementById('progressPercent').textContent = config.progressPercent;

            const progressFill = document.getElementById('progressFill');
            progressFill.className = 'progress-bar-fill ' + config.progressFill.class;
            progressFill.style.width = config.progressFill.width;

            document.getElementById('progressInfo1').textContent = config.progressInfo1;
            document.getElementById('progressInfo2').textContent = config.progressInfo2;

            const mainBtn = document.getElementById('mainBtn');
            mainBtn.className = 'btn-main ' + config.mainBtn.class;
            mainBtn.textContent = config.mainBtn.text;

            document.getElementById('bottomHint').textContent = config.bottomHint;

            config.badges.forEach((badge, index) => {
                const badgeEl = document.getElementById('badge' + (index + 1));
                badgeEl.className = 'badge ' + badge.class;
                badgeEl.innerHTML = '<i class="bi ' + badge.icon + '"></i><span>' + badge.text + '</span>';
            });

            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector('[data-state="' + state + '"]').classList.add('active');
        }

        document.querySelectorAll('.state-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const state = this.getAttribute('data-state');
                updateUI(state);
            });
        });

        window.addEventListener('message', function(e) {
            if (e.origin !== window.location.origin) return;
            const message = e.data;
            if (message.action === 'highlight' && message.featureId) {
                document.querySelectorAll('.prototype-module').forEach(module => {
                    module.classList.remove('feature-highlight');
                });
                const targetModule = document.querySelector('.prototype-module[data-prototype="' + message.featureId + '"]');
                if (targetModule) {
                    targetModule.classList.add('feature-highlight');
                    targetModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });

        updateUI('preheating');
    </script>
</body>
</html>
