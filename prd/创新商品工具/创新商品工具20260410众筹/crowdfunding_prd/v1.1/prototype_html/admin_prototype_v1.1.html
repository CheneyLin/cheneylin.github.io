<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>众筹 - ADMIN 运营后台</title>
    <link href="../assets/libs/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/libs/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #1a1a2e; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; overflow-y: auto; }
        .sidebar-logo { height: 60px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 20px; }
        .sidebar-menu { padding: 16px 0; }
        .menu-group-title { padding: 12px 24px; color: rgba(255,255,255,0.5); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
        .menu-item { padding: 12px 24px; color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; font-size: 14px; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(255,255,255,0.15); color: white; border-left: 3px solid #fff; }
        .menu-item i { font-size: 18px; width: 18px; }
        .main-content { margin-left: 240px; flex: 1; min-height: 100vh; background: #f5f7fa; }
        .main-content iframe { width: 100%; height: 100vh; border: none; display: block; }
        .prototype-module { border: 2px dashed transparent; transition: all 0.3s; }
        .prototype-module:hover { border-color: #667eea; }
        .prototype-module.feature-highlight { border-color: #ff5b4f !important; box-shadow: 0 0 0 4px rgba(255,91,79,0.3); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><i class="bi bi-shop"></i><span style="margin-left:8px;">众筹管理后台</span></div>
        <div class="sidebar-menu">
            <div class="menu-group-title">项目管理</div>
            <div class="menu-item active" data-page="project_list.html" onclick="loadPage('project_list.html', this)">
                <i class="bi bi-list-ul"></i><span>众筹项目列表</span>
            </div>
            <div class="menu-group-title" style="margin-top:20px;">订单管理</div>
            <div class="menu-item" data-page="order_list.html" onclick="loadPage('order_list.html', this)">
                <i class="bi bi-file-earmark-text"></i><span>订单列表</span>
            </div>
        </div>
    </div>
    <div class="main-content">
        <iframe id="adminFrame" src="admin_pages/project_list.html" frameborder="0"></iframe>
        <!-- iframe 池：预加载所有页面，提高切换性能 -->
        <div id="iframePool" style="display:none;">
            <iframe id="pool_project_list" src="admin_pages/project_list.html" frameborder="0"></iframe>
            <iframe id="pool_project_edit" src="admin_pages/project_edit.html" frameborder="0"></iframe>
            <iframe id="pool_order_list" src="admin_pages/order_list.html" frameborder="0"></iframe>
            <iframe id="pool_reservation_list" src="admin_pages/reservation_list.html" frameborder="0"></iframe>
            <iframe id="pool_stretch_goals" src="admin_pages/stretch_goals.html" frameborder="0"></iframe>
        </div>
    </div>
    <script>
        let currentPage = 'project_list.html';
        const iframePool = document.getElementById('iframePool');
        const mainFrame = document.getElementById('adminFrame');
        
        // iframe 池管理：预加载并缓存页面
        const pageCache = {
            'project_list.html': document.getElementById('pool_project_list'),
            'project_edit.html': document.getElementById('pool_project_edit'),
            'order_list.html': document.getElementById('pool_order_list'),
            'reservation_list.html': document.getElementById('pool_reservation_list'),
            'stretch_goals.html': document.getElementById('pool_stretch_goals')
        };

        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            
            // 使用 iframe 池：如果页面已预加载，直接切换 src
            if (pageCache[pageUrl]) {
                mainFrame.src = pageCache[pageUrl].src;
            } else {
                mainFrame.src = `admin_pages/${pageUrl}`;
            }
            
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');
            else { const m = document.querySelector(`[data-page="${pageUrl}"]`); if (m) m.classList.add('active'); }
        }
        
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight' && e.data.featureId) {
                const idMap = {
                    'admin_project_list': 'project_list.html',
                    'admin_project_list_create': 'project_edit.html',
                    'admin_project_list_sku': 'project_edit.html',
                    'admin_project_list_benfit': 'stretch_goals.html',
                    'admin_order_manage': 'order_list.html'
                };
                const page = idMap[e.data.featureId];
                if (page && page !== currentPage) loadPage(page, null);
                setTimeout(() => {
                    mainFrame.contentWindow.postMessage(e.data, '*');
                }, 300);
            }
        });
    </script>
</body>
</html>
