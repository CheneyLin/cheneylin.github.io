<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单列表</title>
    <link href="../../assets/bootstrap.main.css" rel="stylesheet">
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e4e7ed; }
        .header h4 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
        .content { padding: 24px; }
        .filter-bar { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
        .filter-bar select, .filter-bar input { border: 1px solid #e4e7ed; border-radius: 4px; padding: 6px 12px; font-size: 14px; }
        .btn-primary { background: #667eea; border: none; color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .table { background: #fff; border-radius: 8px; overflow: hidden; width: 100%; border-collapse: collapse; }
        .table th { background: #f9fafb; font-weight: 600; font-size: 13px; padding: 12px; text-align: left; }
        .table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        .prototype-module { border: 2px dashed transparent; transition: all 0.3s; }
        .prototype-module:hover, .prototype-module.feature-highlight { border-color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <h4><i class="bi bi-file-earmark-text"></i> 众筹订单列表</h4>
    </div>
    <div class="content">
        <div class="filter-bar">
            <select>
                <option value="">全部项目</option>
                <option>星际探险家系列周边</option>
                <option>限定二次元手办众筹</option>
            </select>
            <select>
                <option value="">全部状态</option>
                <option>进行中</option>
                <option>成功</option>
                <option>失败</option>
                <option>已退款</option>
                <option>已取消</option>
            </select>
            <input type="text" placeholder="订单号/用户ID" style="flex:1;">
            <button class="btn-primary">搜索</button>
            <button class="btn-primary" style="background:#28a745;">导出</button>
        </div>
        <table class="table" data-prototype="admin_order_manage">
            <thead>
                <tr>
                    <th>订单号</th>
                    <th>用户</th>
                    <th>项目</th>
                    <th>SKU</th>
                    <th>数量</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody class="prototype-module">
                <tr>
                    <td>CF20260410001</td>
                    <td>138****1234</td>
                    <td>星际探险家系列周边</td>
                    <td>早鸟档</td>
                    <td>2</td>
                    <td>¥596</td>
                    <td><span class="badge badge-success">成功</span></td>
                    <td>04-10 14:23</td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">查看</button></td>
                </tr>
                <tr>
                    <td>CF20260410002</td>
                    <td>159****5678</td>
                    <td>星际探险家系列周边</td>
                    <td>标准档</td>
                    <td>1</td>
                    <td>¥299</td>
                    <td><span class="badge badge-warning">进行中</span></td>
                    <td>04-10 15:01</td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">查看</button></td>
                </tr>
                <tr>
                    <td>CF20260409001</td>
                    <td>177****9012</td>
                    <td>限定二次元手办众筹</td>
                    <td>限定档</td>
                    <td>1</td>
                    <td>¥699</td>
                    <td><span class="badge badge-info">已退款</span></td>
                    <td>04-09 10:30</td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">查看</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight') {
                document.querySelectorAll('.prototype-module').forEach(m => m.classList.remove('feature-highlight'));
                if (e.data.featureId === 'admin_order_manage') document.querySelector('.table').classList.add('feature-highlight');
            }
        });
    </script>
</body>
</html>
