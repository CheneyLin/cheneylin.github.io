<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认订单</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #171717; max-width: 375px; margin: 0 auto; }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 16px; font-weight: 600; border-bottom: 1px solid #f0f0f0; }
        .section { background: #fff; padding: 16px; margin-bottom: 10px; }
        .section-title { font-size: 14px; font-weight: 600; color: #999; margin-bottom: 12px; text-transform: uppercase; }
        .order-item { display: flex; gap: 12px; align-items: center; }
        .order-img { width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; flex-shrink: 0; }
        .order-info { flex: 1; }
        .order-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .order-sku { font-size: 13px; color: #999; }
        .order-price { font-size: 16px; font-weight: 700; color: #667eea; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { font-weight: 500; }
        .notice { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 13px; color: #ad6800; display: flex; gap: 8px; align-items: flex-start; }
        .coupon-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid #f0f0f0; margin-top: 8px; }
        .coupon-btn { color: #667eea; font-size: 14px; cursor: pointer; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 375px; margin: 0 auto; background: #fff; border-top: 1px solid #f0f0f0; padding: 12px 16px; z-index: 100; }
        .price-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .price-label { font-size: 14px; color: #666; }
        .total-price { font-size: 22px; font-weight: 700; color: #667eea; }
        .btn-pay { width: 100%; background: #667eea; border: none; color: #fff; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-pay:active { opacity: 0.9; }
        .prototype-module { border: 2px dashed transparent; transition: all 0.3s; }
        .prototype-module:hover, .prototype-module.feature-highlight { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.2); }
    </style>
</head>
<body>
    <div class="status-bar">
        <span><i class="fas fa-chevron-left"></i></span>
        <span>确认订单</span>
        <span></span>
    </div>

    <div class="section prototype-module" data-prototype="app_participate">
        <div class="section-title">众筹项目</div>
        <div class="order-item">
            <div class="order-img"><i class="fas fa-rocket"></i></div>
            <div class="order-info">
                <div class="order-name">星际探险家系列周边</div>
                <div class="order-sku">早鸟档 · 限量金属徽章</div>
            </div>
            <div class="order-price">¥298</div>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;font-size:14px;">
            <span style="color:#666;">购买数量</span>
            <span style="font-weight:600;">x1</span>
        </div>
    </div>

    <div class="section prototype-module" data-prototype="app_participate">
        <div class="section-title">支付方式</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
            <div style="display:flex;align-items:center;gap:10px;">
                <i class="fab fa-alipay" style="font-size:24px;color:#1677ff;"></i>
                <span style="font-size:15px;">支付宝</span>
            </div>
            <i class="fas fa-check-circle" style="color:#667eea;"></i>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;">
            <div style="display:flex;align-items:center;gap:10px;">
                <i class="fab fa-weixin" style="font-size:24px;color:#07c160;"></i>
                <span style="font-size:15px;">微信支付</span>
            </div>
            <i class="fas fa-circle" style="color:#ddd;"></i>
        </div>
    </div>

    <div class="section prototype-module" data-prototype="app_participate">
        <div class="section-title">订单信息</div>
        <div class="info-row">
            <span class="info-label">订单编号</span>
            <span class="info-value">CF20260410089</span>
        </div>
        <div class="info-row">
            <span class="info-label">创建时间</span>
            <span class="info-value">2026-04-10 16:30</span>
        </div>
        <div class="info-row">
            <span class="info-label">预计发货</span>
            <span class="info-value">2026年6月</span>
        </div>
        <div class="notice">
            <i class="fas fa-info-circle" style="margin-top:2px;"></i>
            <span>本项目为众筹商品，支持7天无理由退款（资格券订单除外）。众筹失败将原路退款。</span>
        </div>
    </div>

    <div style="height:90px;"></div>
    <div class="bottom-bar">
        <div class="price-display">
            <span class="price-label">应付金额</span>
            <span class="total-price">¥298.00</span>
        </div>
        <button class="btn-pay" onclick="window.location.href='success.html'">立即支付</button>
    </div>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight') {
                document.querySelectorAll('.prototype-module').forEach(m => m.classList.remove('feature-highlight'));
                document.querySelectorAll(`[data-prototype="${e.data.featureId}"]`).forEach(t => { t.classList.add('feature-highlight'); t.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
            }
        });
    </script>
</body>
</html>
