<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多级目标配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e4e7ed; display: flex; justify-content: space-between; align-items: center; }
        .header h4 { font-size: 18px; font-weight: 600; margin: 0; }
        .content { padding: 24px; }
        .project-selector { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
        .project-selector select { border: 1px solid #e4e7ed; border-radius: 4px; padding: 8px 12px; font-size: 14px; flex: 1; }
        .goal-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #667eea; }
        .goal-card.unlocked { border-left-color: #28a745; background: #fafff0; }
        .goal-card.locked { border-left-color: #ccc; opacity: 0.7; }
        .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .goal-header h5 { font-size: 16px; font-weight: 600; margin: 0; }
        .goal-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-all { background: #d4edda; color: #155724; }
        .badge-lottery { background: #fff3cd; color: #856404; }
        .badge-locked { background: #e2e3e5; color: #383d41; }
        .badge-unlocked { background: #28a745; color: #fff; }
        .goal-body { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .goal-field { }
        .goal-field label { font-size: 12px; color: #909399; display: block; margin-bottom: 4px; }
        .goal-field span { font-size: 14px; font-weight: 500; }
        .progress-mini { height: 6px; background: #e4e7ed; border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .progress-mini-fill { height: 100%; background: #667eea; border-radius: 3px; }
        .btn-primary { background: #667eea; border: none; color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-sm { padding: 4px 12px; font-size: 13px; }
        .btn-outline { background: #fff; border: 1px solid #e4e7ed; color: #606266; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .prototype-module { border: 2px dashed transparent; transition: all 0.3s; }
        .prototype-module:hover, .prototype-module.feature-highlight { border-color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <h4><i class="bi bi-trophy"></i> 多级目标配置</h4>
        <button class="btn-primary btn-sm"><i class="bi bi-plus"></i> 添加目标档位</button>
    </div>
    <div class="content">
        <div class="project-selector">
            <select>
                <option>星际探险家系列周边</option>
                <option>限定二次元手办众筹</option>
            </select>
            <select>
                <option>全部状态</option>
                <option>已解锁</option>
                <option>未解锁</option>
            </select>
        </div>
        <div class="goal-card unlocked prototype-module" data-prototype="admin_stretch_config">
            <div class="goal-header">
                <h5>目标档位 1：¥50,000 解锁</h5>
                <div style="display:flex;gap:8px;">
                    <span class="goal-badge badge-unlocked">已解锁</span>
                    <span class="goal-badge badge-all">全员赠送</span>
                </div>
            </div>
            <div class="goal-body">
                <div class="goal-field">
                    <label>解锁类型</label>
                    <span>金额</span>
                </div>
                <div class="goal-field">
                    <label>阈值</label>
                    <span>¥50,000</span>
                </div>
                <div class="goal-field">
                    <label>奖励内容</label>
                    <span>限量金属徽章</span>
                </div>
                <div class="goal-field">
                    <label>履约方式</label>
                    <span>随主包裹发货</span>
                </div>
            </div>
            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                        <span>当前进度</span><span style="font-weight:600;">¥68,000 / ¥50,000</span>
                    </div>
                    <div class="progress-mini"><div class="progress-mini-fill" style="width:100%"></div></div>
                </div>
                <button class="btn-outline btn-sm" style="margin-left:16px;">编辑</button>
            </div>
        </div>
        <div class="goal-card prototype-module" data-prototype="admin_stretch_config">
            <div class="goal-header">
                <h5>目标档位 2：¥80,000 解锁</h5>
                <div style="display:flex;gap:8px;">
                    <span class="goal-badge badge-locked">未解锁</span>
                    <span class="goal-badge badge-lottery">抽选</span>
                </div>
            </div>
            <div class="goal-body">
                <div class="goal-field">
                    <label>解锁类型</label>
                    <span>金额</span>
                </div>
                <div class="goal-field">
                    <label>阈值</label>
                    <span>¥80,000</span>
                </div>
                <div class="goal-field">
                    <label>奖励内容</label>
                    <span>设计师签名海报</span>
                </div>
                <div class="goal-field">
                    <label>履约方式</label>
                    <span>分开发货</span>
                </div>
            </div>
            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                        <span>当前进度</span><span style="font-weight:600;">¥68,000 / ¥80,000</span>
                    </div>
                    <div class="progress-mini"><div class="progress-mini-fill" style="width:85%"></div></div>
                </div>
                <button class="btn-outline btn-sm" style="margin-left:16px;">编辑</button>
            </div>
        </div>
        <div class="goal-card prototype-module" data-prototype="admin_stretch_config">
            <div class="goal-header">
                <h5>目标档位 3：¥100,000 解锁</h5>
                <div style="display:flex;gap:8px;">
                    <span class="goal-badge badge-locked">未解锁</span>
                    <span class="goal-badge badge-lottery">抽选</span>
                </div>
            </div>
            <div class="goal-body">
                <div class="goal-field">
                    <label>解锁类型</label>
                    <span>金额</span>
                </div>
                <div class="goal-field">
                    <label>阈值</label>
                    <span>¥100,000</span>
                </div>
                <div class="goal-field">
                    <label>奖励内容</label>
                    <span>全套周边福袋</span>
                </div>
                <div class="goal-field">
                    <label>履约方式</label>
                    <span>随主包裹发货</span>
                </div>
            </div>
            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                        <span>当前进度</span><span style="font-weight:600;">¥68,000 / ¥100,000</span>
                    </div>
                    <div class="progress-mini"><div class="progress-mini-fill" style="width:68%"></div></div>
                </div>
                <button class="btn-outline btn-sm" style="margin-left:16px;">编辑</button>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight') {
                document.querySelectorAll('.prototype-module').forEach(m => m.classList.remove('feature-highlight'));
                const targets = document.querySelectorAll(`[data-prototype="${e.data.featureId}"]`);
                targets.forEach(t => { t.classList.add('feature-highlight'); t.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
            }
        });
    </script>
</body>
</html>
