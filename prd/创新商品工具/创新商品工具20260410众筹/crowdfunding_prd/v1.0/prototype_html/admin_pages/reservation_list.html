<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e4e7ed; display: flex; justify-content: space-between; align-items: center; }
        .header h4 { font-size: 18px; font-weight: 600; margin: 0; }
        .content { padding: 24px; }
        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-card .label { font-size: 14px; color: #909399; margin-top: 4px; }
        .filter-bar { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
        .filter-bar select { border: 1px solid #e4e7ed; border-radius: 4px; padding: 6px 12px; font-size: 14px; }
        .btn-primary { background: #667eea; border: none; color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .table { background: #fff; border-radius: 8px; overflow: hidden; width: 100%; border-collapse: collapse; }
        .table th { background: #f9fafb; font-weight: 600; font-size: 13px; padding: 12px; text-align: left; }
        .table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .prototype-module { border: 2px dashed transparent; transition: all 0.3s; }
        .prototype-module:hover, .prototype-module.feature-highlight { border-color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <h4><i class="bi bi-bell"></i> 预约管理</h4>
        <button class="btn-primary">导出列表</button>
    </div>
    <div class="content">
        <div class="stat-cards prototype-module" data-prototype="admin_reservation_manage">
            <div class="stat-card">
                <div class="num">256</div>
                <div class="label">总预约人数</div>
            </div>
            <div class="stat-card">
                <div class="num">89</div>
                <div class="label">今日新增</div>
            </div>
            <div class="stat-card">
                <div class="num">180</div>
                <div class="label">已转化购买</div>
            </div>
        </div>
        <div class="filter-bar">
            <select>
                <option value="">全部项目</option>
                <option>星际探险家系列周边</option>
                <option>限定二次元手办众筹</option>
            </select>
            <select>
                <option value="">全部状态</option>
                <option>已预约</option>
                <option>已转化</option>
            </select>
            <button class="btn-primary">筛选</button>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>用户</th>
                    <th>手机号</th>
                    <th>预约项目</th>
                    <th>预约时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody class="prototype-module" data-prototype="admin_reservation_manage">
                <tr>
                    <td>用户_Alice</td>
                    <td>138****1234</td>
                    <td>限定二次元手办众筹</td>
                    <td>04-08 10:23</td>
                    <td><span class="badge" style="background:#d1ecf1;color:#0c5460;">已预约</span></td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">发送提醒</button></td>
                </tr>
                <tr>
                    <td>用户_Bob</td>
                    <td>159****5678</td>
                    <td>限定二次元手办众筹</td>
                    <td>04-08 14:56</td>
                    <td><span class="badge" style="background:#d4edda;color:#155724;">已转化</span></td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">查看订单</button></td>
                </tr>
                <tr>
                    <td>用户_Charlie</td>
                    <td>177****9012</td>
                    <td>限定二次元手办众筹</td>
                    <td>04-09 09:12</td>
                    <td><span class="badge" style="background:#d1ecf1;color:#0c5460;">已预约</span></td>
                    <td><button style="border:none;background:none;color:#667eea;cursor:pointer;">发送提醒</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight') {
                document.querySelectorAll('.prototype-module').forEach(m => m.classList.remove('feature-highlight'));
                const targets = document.querySelectorAll(`[data-prototype="${e.data.featureId}"]`);
                targets.forEach(t => { t.classList.add('feature-highlight'); t.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
            }
        });
    </script>
</body>
</html>
