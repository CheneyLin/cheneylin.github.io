<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快闪店预售商品回填单 - ADMIN 运营后台</title>
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ============================================
           Vercel Design System - Geist-inspired
           ============================================ */

        :root {
            /* Colors */
            --geist-black: #171717;
            --geist-white: #ffffff;
            --geist-gray-900: #171717;
            --geist-gray-600: #4d4d4d;
            --geist-gray-500: #666666;
            --geist-gray-400: #808080;
            --geist-gray-100: #ebebeb;
            --geist-gray-50: #fafafa;

            /* Shadows (Vercel's signature shadow-as-border) */
            --shadow-border: rgba(0, 0, 0, 0.8) 0px 0px 0px 1px;
            --shadow-subtle: rgba(3, 2, 2, 0.06) 0px 2px 4px;
            --shadow-card: rgba(0,0,0,0.12) 0px 0px 0px 1px, rgba(0,0,0,0.06) 0px 4px 8px, rgba(0,0,0,0.04) 0px 12px 16px -4px;
            --shadow-focus: 0 0 0 2px hsla(212, 100%, 48%, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-feature-settings: "liga" 1;
            -webkit-font-smoothing: antialiased;
            font-size: 14px;
            line-height: 1.5;
            background: var(--geist-gray-50);
            color: var(--geist-black);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--geist-black);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: var(--shadow-border);
        }

        .sidebar-logo {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--geist-white);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 20px;
        }

        .sidebar-menu {
            padding: 16px 0;
        }

        .menu-group-title {
            padding: 12px 24px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .menu-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--geist-white);
        }

        .menu-item.active {
            background: rgba(255,255,255,0.15);
            color: var(--geist-white);
            border-left: 3px solid var(--geist-white);
        }

        .menu-item:focus-visible {
            outline: var(--shadow-focus);
            outline-offset: -2px;
        }

        .menu-item i {
            font-size: 18px;
            width: 18px;
        }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            background: var(--geist-gray-50);
        }

        .main-content iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-shop"></i>
            <span style="margin-left: 8px;">快闪店管理</span>
        </div>
        <div class="sidebar-menu">
            <div class="menu-group-title">快闪店</div>
            <div class="menu-item active" data-page="admin_activity.html" onclick="loadPage('admin_activity.html', this)">
                <i class="bi bi-calendar-event"></i>
                <span>线下场次管理</span>
            </div>

            <div class="menu-group-title" style="margin-top: 20px;">回填单管理</div>
            <div class="menu-item" data-page="admin_back_form.html" onclick="loadPage('admin_back_form.html', this)">
                <i class="bi bi-file-earmark-text"></i>
                <span>回填单审核</span>
            </div>
        </div>
    </div>

    <!-- Main Content Area with iframe -->
    <div class="main-content">
        <iframe id="adminFrame" src="admin_pages/admin_activity.html" frameborder="0"></iframe>
    </div>

    <script>
        let currentPage = 'admin_activity.html';

        // 加载页面函数
        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            const frame = document.getElementById('adminFrame');
            frame.src = `admin_pages/${pageUrl}`;

            // 更新菜单激活状态
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });

            if (element) {
                element.classList.add('active');
            } else {
                // 如果没有传入 element，根据 pageUrl 查找
                const menuItem = document.querySelector(`[data-page="${pageUrl}"]`);
                if (menuItem) {
                    menuItem.classList.add('active');
                }
            }

            // 更新 URL hash
            window.location.hash = pageUrl;
        }

        // 监听来自子页面的导航消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                if (menuItem) {
                    loadPage(targetPage, menuItem);
                }
            }
        });

        // 监听来自父窗口的高亮消息（PRD 联动）
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const featureId = event.data.featureId;

                // 映射 featureId 到页面
                let targetPage = null;
                if (featureId.startsWith('admin_activity')) {
                    targetPage = 'admin_activity.html';
                } else if (featureId.startsWith('admin_back_form')) {
                    targetPage = 'admin_back_form.html';
                }

                if (targetPage) {
                    // 切换到对应页面
                    const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                    if (menuItem) {
                        loadPage(targetPage, menuItem);

                        // 转发高亮消息到 iframe
                        setTimeout(() => {
                            const frame = document.getElementById('adminFrame');
                            if (frame && frame.contentWindow) {
                                frame.contentWindow.postMessage({
                                    action: 'highlight',
                                    featureId: featureId
                                }, '*');
                            }
                        }, 300);
                    }
                }
            }
        });

        // 处理 URL hash 变化
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });

        // 页面加载时检查 hash
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
    </script>
</body>
</html>
