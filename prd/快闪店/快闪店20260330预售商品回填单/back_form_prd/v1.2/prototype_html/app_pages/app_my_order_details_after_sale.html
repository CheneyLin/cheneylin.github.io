<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请售后</title>
    <link href="../../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --geist-black: #171717;
            --geist-white: #ffffff;
            --geist-gray-900: #171717;
            --geist-gray-600: #4d4d4d;
            --geist-gray-500: #666666;
            --geist-gray-400: #808080;
            --geist-gray-100: #ebebeb;
            --geist-gray-50: #fafafa;
            --focus-blue: hsla(212, 100%, 48%, 1);
            --shadow-border: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
            --shadow-subtle: rgba(0, 0, 0, 0.04) 0px 2px 2px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-feature-settings: "liga" 1;
            -webkit-font-smoothing: antialiased;
            background: var(--geist-gray-50);
            color: var(--geist-black);
            height: 812px;
            overflow: hidden;
        }
        .app-status-bar { height: 44px; background: var(--geist-white); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; border-bottom: var(--shadow-border); }
        .app-nav-bar { height: 56px; background: var(--geist-white); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: var(--shadow-border); }
        .app-nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .app-nav-back:hover { background: var(--geist-gray-50); }
        .app-nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
        .app-nav-placeholder { width: 32px; }
        .app-page-content { height: calc(812px - 44px - 56px); overflow-y: auto; padding: 12px; }
        .app-page-content::-webkit-scrollbar { width: 0; }
        .app-card { background: var(--geist-white); border-radius: 8px; box-shadow: var(--shadow-border); overflow: hidden; }
        .app-after-sale-option { display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .app-after-sale-option:hover { background: var(--geist-gray-50); }
        .app-after-sale-option:active { background: var(--geist-gray-100); }
        .app-after-sale-option + .app-after-sale-option { border-top: var(--shadow-border); }
        .app-after-sale-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .app-after-sale-icon-orange { color: #ff6b35; }
        .app-after-sale-icon-red { color: #ff3333; }
        .app-after-sale-icon-blue { color: var(--focus-blue); }
        .app-after-sale-icon i { font-size: 24px; }
        .app-after-sale-text { flex: 1; }
        .app-after-sale-title { font-size: 15px; font-weight: 500; color: var(--geist-black); margin-bottom: 4px; }
        .app-after-sale-desc { font-size: 12px; color: var(--geist-gray-400); line-height: 1.4; }
        .app-after-sale-arrow { color: var(--geist-gray-400); font-size: 16px; }
        .feature-highlight { border: 2px solid var(--focus-blue) !important; box-shadow: 0 0 0 4px hsla(212, 100%, 48%, 0.2); transition: all 0.3s; }
        .prototype-module { transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="app-status-bar">
        <span>10:32</span>
        <div class="flex items-center gap-2">
            <i class="bi bi-reception-4"></i>
            <i class="bi bi-wifi"></i>
            <i class="bi bi-battery-full"></i>
        </div>
    </div>
    <div class="app-nav-bar">
        <div class="app-nav-back"><i class="bi bi-chevron-left"></i></div>
        <div class="app-nav-title">申请售后</div>
        <div class="app-nav-placeholder"></div>
    </div>
    <div class="app-page-content">
        <div class="app-card prototype-module" data-prototype="app_my_order_details_after_sale">
            <div class="app-after-sale-option">
                <div class="app-after-sale-icon app-after-sale-icon-blue">
                    <i class="bi bi-box-seam"></i>
                </div>
                <div class="app-after-sale-text">
                    <div class="app-after-sale-title">申请补寄</div>
                    <div class="app-after-sale-desc">商品少发、漏发或质量问题，与商家协商补寄</div>
                </div>
                <i class="bi bi-chevron-right app-after-sale-arrow"></i>
            </div>
        </div>
    </div>
    <script>
        // 接收父窗口高亮消息
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'highlight' && e.data.featureId) {
                document.querySelectorAll('.prototype-module').forEach(module => { module.classList.remove('feature-highlight'); });
                const targetModule = document.querySelector(`.prototype-module[data-prototype="${e.data.featureId}"]`);
                if (targetModule) {
                    targetModule.classList.add('feature-highlight');
                    targetModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });
        // 通知父窗口页面加载完成
        window.parent.postMessage({ type: 'PAGE_LOADED', page: 'app_my_order_details_after_sale.html' }, '*');
    </script>
</body>
</html>
