<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快闪店预售商品回填单 - APP 端原型 v1.2</title>
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --geist-black: #171717;
            --geist-white: #ffffff;
            --geist-gray-900: #171717;
            --geist-gray-600: #4d4d4d;
            --geist-gray-500: #666666;
            --geist-gray-400: #808080;
            --geist-gray-100: #ebebeb;
            --geist-gray-50: #fafafa;
            --focus-blue: hsla(212, 100%, 48%, 1);
            --ship-red: #ff5b4f;
            --preview-pink: #de1d8d;
            --develop-blue: #0a72ef;
            --shadow-border: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
            --shadow-subtle: rgba(0, 0, 0, 0.04) 0px 2px 2px;
            --shadow-card: rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 2px, rgba(0,0,0,0.04) 0px 8px 8px -8px, var(--geist-gray-50) 0px 0px 0px 1px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-feature-settings: "liga" 1;
            -webkit-font-smoothing: antialiased;
            background: var(--geist-white);
            color: var(--geist-black);
            min-height: 100vh;
        }
        h1 { text-align: center; margin: 20px 0 0 0; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 2; }
        #prototypeContainer { width: 100%; min-height: 100vh; transition: all 0.3s ease; }
        .global-view { padding: 40px; max-width: 1800px; margin: 0 auto; background: var(--geist-white); }
        .global-view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(399px, 1fr)); gap: 48px; justify-content: center; align-items: start; }
        .global-view .phone-frame-container { width: 399px !important; height: 836px !important; margin: 0 auto; }
        .global-view .phone-frame-container::after { content: attr(data-page-label); display: block; text-align: center; margin-top: 16px; font-size: 14px; font-weight: 500; color: var(--geist-gray-600); letter-spacing: -0.28px; }
        .single-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; background: var(--geist-white); }
        .phone-frame-container { position: relative; width: 399px; height: 836px; background: var(--geist-black); border-radius: 50px; padding: 12px; box-shadow: var(--shadow-card); transition: box-shadow 0.3s ease; flex-shrink: 0; }
        .phone-frame-container:hover { box-shadow: rgba(0,0,0,0.12) 0px 0px 0px 1px, rgba(0,0,0,0.06) 0px 4px 4px, rgba(0,0,0,0.06) 0px 12px 12px -6px, var(--geist-gray-50) 0px 0px 0px 1px; }
        .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: var(--geist-black); border-radius: 0 0 20px 20px; z-index: 100; }
        .phone-screen { width: 375px; height: 812px; background: var(--geist-white); border-radius: 40px; overflow: hidden; position: relative; }
        .phone-screen iframe { width: 375px; height: 812px; border: none; display: block; }
        .controls-bar { position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 1000; background: var(--geist-white); padding: 8px; border-radius: 8px; box-shadow: var(--shadow-card); }
        .control-btn { background: var(--geist-white); color: var(--geist-black); border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-border); font-family: inherit; min-height: 38px; line-height: 1.5; }
        .control-btn:hover { background: var(--geist-gray-50); transform: translateY(-1px); }
        .control-btn.active { background: var(--geist-black); color: var(--geist-white); }
        .control-btn:focus { outline: 2px solid var(--focus-blue); outline-offset: 2px; }
        .page-selector-bar { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: var(--geist-white); border-radius: 8px; padding: 8px; box-shadow: var(--shadow-card); z-index: 1000; display: flex; gap: 6px; max-width: 90vw; overflow-x: auto; }
        .page-selector-bar::-webkit-scrollbar { height: 4px; }
        .page-selector-bar::-webkit-scrollbar-thumb { background: var(--geist-gray-100); border-radius: 2px; }
        .page-item-bar { padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500; color: var(--geist-gray-600); display: flex; align-items: center; gap: 6px; white-space: nowrap; box-shadow: var(--shadow-border); min-height: 38px; line-height: 1.5; }
        .page-item-bar:hover { background: var(--geist-gray-50); color: var(--geist-black); }
        .page-item-bar.active { background: var(--geist-black); color: var(--geist-white); }
        .page-item-bar i { font-size: 14px; width: 14px; }
        .page-dropdown { display: none; position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .dropdown-toggle { background: var(--geist-white); color: var(--geist-black); border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-card); transition: all 0.2s; font-family: inherit; min-height: 38px; line-height: 1.5; }
        .dropdown-toggle:hover { background: var(--geist-gray-50); }
        .dropdown-menu { position: absolute; top: 100%; left: 0; margin-top: 8px; background: var(--geist-white); border-radius: 8px; box-shadow: var(--shadow-card); padding: 8px; min-width: 200px; display: none; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 10px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; color: var(--geist-gray-600); display: flex; align-items: center; gap: 8px; }
        .dropdown-item:hover { background: var(--geist-gray-50); color: var(--geist-black); }
        .dropdown-item.active { background: var(--geist-black); color: var(--geist-white); }
        .dropdown-item i { font-size: 14px; width: 14px; }
        @media (max-width: 1024px) { .page-selector-bar { display: none !important; } .page-dropdown { display: block; } .global-view { padding: 40px 20px; } .global-view-grid { grid-template-columns: repeat(auto-fill, minmax(375px, 1fr)); gap: 30px; } }
        @media (max-width: 768px) { .global-view { padding: 30px 16px; } .global-view-grid { grid-template-columns: 1fr; gap: 24px; } .controls-bar { top: 10px; right: 10px; } .page-dropdown { top: 70px; left: 10px; } }
        .global-view .single-only { display: none !important; }
        .single-view .global-only { display: none !important; }
    </style>
</head>
<body>
    <h1>快闪店预售商品回填单 - APP 端原型 v1.2</h1>

    <!-- Top Center Page Selector Bar (Single View Only) - Desktop -->
    <div class="page-selector-bar single-only">
        <div class="page-item-bar active" data-page="app_my_order_list.html" onclick="loadPage('app_my_order_list.html', this)">
            <i class="bi bi-list-ul"></i>
            <span>订单列表</span>
        </div>
        <div class="page-item-bar" data-page="app_my_order_details_waiting_out.html" onclick="loadPage('app_my_order_details_waiting_out.html', this)">
            <i class="bi bi-box-seam"></i>
            <span>待发货订单</span>
        </div>
        <div class="page-item-bar" data-page="app_my_order_details_completed.html" onclick="loadPage('app_my_order_details_completed.html', this)">
            <i class="bi bi-check-circle"></i>
            <span>已完成订单</span>
        </div>
        <div class="page-item-bar" data-page="app_my_order_details_waiting_receive.html" onclick="loadPage('app_my_order_details_waiting_receive.html', this)">
            <i class="bi bi-box-arrow-right"></i>
            <span>待收货订单</span>
        </div>
        <div class="page-item-bar" data-page="app_my_order_details_after_sale.html" onclick="loadPage('app_my_order_details_after_sale.html', this)">
            <i class="bi bi-arrow-return-left"></i>
            <span>申请售后</span>
        </div>
    </div>

    <!-- Top Center Page Dropdown (Single View Only) - Mobile -->
    <div class="page-dropdown single-only">
        <button class="dropdown-toggle" onclick="toggleDropdown()">
            <i class="bi bi-list"></i>
            <span id="currentPageLabel">订单列表</span>
            <i class="bi bi-chevron-down" style="margin-left: 4px;"></i>
        </button>
        <div class="dropdown-menu" id="pageDropdownMenu">
            <div class="dropdown-item active" data-page="app_my_order_list.html" onclick="loadPage('app_my_order_list.html', this)">
                <i class="bi bi-list-ul"></i>
                <span>订单列表</span>
            </div>
            <div class="dropdown-item" data-page="app_my_order_details_waiting_out.html" onclick="loadPage('app_my_order_details_waiting_out.html', this)">
                <i class="bi bi-box-seam"></i>
                <span>待发货订单</span>
            </div>
            <div class="dropdown-item" data-page="app_my_order_details_completed.html" onclick="loadPage('app_my_order_details_completed.html', this)">
                <i class="bi bi-check-circle"></i>
                <span>已完成订单</span>
            </div>
            <div class="dropdown-item" data-page="app_my_order_details_waiting_receive.html" onclick="loadPage('app_my_order_details_waiting_receive.html', this)">
                <i class="bi bi-box-arrow-right"></i>
                <span>待收货订单</span>
            </div>
            <div class="dropdown-item" data-page="app_my_order_details_after_sale.html" onclick="loadPage('app_my_order_details_after_sale.html', this)">
                <i class="bi bi-arrow-return-left"></i>
                <span>申请售后</span>
            </div>
        </div>
    </div>

    <!-- Top Right Controls Bar -->
    <div class="controls-bar">
        <button class="control-btn active" id="btnSingleView" onclick="switchView('single')">
            <i class="bi bi-phone"></i>
            <span>单独界面</span>
        </button>
        <button class="control-btn" id="btnGlobalView" onclick="switchView('global')">
            <i class="bi bi-grid-3x3"></i>
            <span>全局视图</span>
        </button>
    </div>

    <!-- Main Prototype Container -->
    <div id="prototypeContainer" class="single-view">
        <!-- Single View: One Phone Frame with iframe -->
        <div class="phone-frame-container single-only">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <iframe id="prototypeFrame" src="app_pages/app_my_order_list.html" frameborder="0"></iframe>
            </div>
        </div>

        <!-- Global View: All Phone Frames with iframes -->
        <div class="global-view global-only" style="display: none;">
            <div class="global-view-grid">
                <div class="phone-frame-container" data-page-label="订单列表">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe src="app_pages/app_my_order_list.html" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="phone-frame-container" data-page-label="待发货订单">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe src="app_pages/app_my_order_details_waiting_out.html" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="phone-frame-container" data-page-label="已完成订单">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe src="app_pages/app_my_order_details_completed.html" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="phone-frame-container" data-page-label="待收货订单">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe src="app_pages/app_my_order_details_waiting_receive.html" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="phone-frame-container" data-page-label="申请售后">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe src="app_pages/app_my_order_details_after_sale.html" frameborder="0"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'single';
        let currentPage = 'app_my_order_details_completed.html';
        let dropdownOpen = false;

        // Toggle dropdown menu
        function toggleDropdown() {
            dropdownOpen = !dropdownOpen;
            const menu = document.getElementById('pageDropdownMenu');
            if (dropdownOpen) { menu.classList.add('show'); } else { menu.classList.remove('show'); }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.querySelector('.page-dropdown');
            if (dropdown && !dropdown.contains(event.target)) {
                dropdownOpen = false;
                const menu = document.getElementById('pageDropdownMenu');
                if (menu) { menu.classList.remove('show'); }
            }
        });

        // Switch between single and global view
        function switchView(mode) {
            currentView = mode;
            const container = document.getElementById('prototypeContainer');
            const btnSingle = document.getElementById('btnSingleView');
            const btnGlobal = document.getElementById('btnGlobalView');

            if (mode === 'single') {
                container.className = 'single-view';
                btnSingle.classList.add('active');
                btnGlobal.classList.remove('active');
                document.querySelectorAll('.single-only').forEach(el => { el.style.display = ''; });
                document.querySelectorAll('.global-only').forEach(el => { el.style.display = 'none'; });
            } else {
                container.className = 'global-view';
                btnGlobal.classList.add('active');
                btnSingle.classList.remove('active');
                document.querySelectorAll('.single-only').forEach(el => { el.style.display = 'none'; });
                document.querySelectorAll('.global-only').forEach(el => { el.style.display = ''; });
            }
            window.location.hash = mode;
        }

        // Load specific page in single view
        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            const frame = document.getElementById('prototypeFrame');
            frame.src = `app_pages/${pageUrl}`;

            document.querySelectorAll('.page-item-bar').forEach(item => { item.classList.remove('active'); });
            document.querySelectorAll('.dropdown-item').forEach(item => { item.classList.remove('active'); });

            if (element) {
                element.classList.add('active');
                const pageName = element.getAttribute('data-page');
                const otherItem = document.querySelector(`[data-page="${pageName}"]:not(.${element.className.split(' ')[0]})`);
                if (otherItem) { otherItem.classList.add('active'); }
            }
            updateDropdownLabel();
            dropdownOpen = false;
            const menu = document.getElementById('pageDropdownMenu');
            if (menu) { menu.classList.remove('show'); }
            window.location.hash = `single-${pageUrl}`;
        }

        // Update dropdown label
        function updateDropdownLabel() {
            const pageNames = {
                'app_my_order_list.html': '订单列表',
                'app_my_order_details_waiting_out.html': '待发货订单',
                'app_my_order_details_completed.html': '已完成订单',
                'app_my_order_details_waiting_receive.html': '待收货订单',
                'app_my_order_details_after_sale.html': '申请售后'
            };
            const label = document.getElementById('currentPageLabel');
            if (label) { label.textContent = pageNames[currentPage] || '页面'; }
        }

        // Handle URL hash changes
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            handleHashChange(hash);
        });

        // Handle hash on page load
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            if (hash) { handleHashChange(hash); }
            updateDropdownLabel();
        });

        function handleHashChange(hash) {
            if (hash === 'global') { switchView('global'); }
            else if (hash === 'single') { switchView('single'); }
            else if (hash.startsWith('single-')) {
                const pageUrl = hash.substring(7);
                switchView('single');
                const pageItem = document.querySelector(`[data-page="${pageUrl}"]`);
                if (pageItem) { loadPage(pageUrl, pageItem); }
            }
        }

        // Listen for messages from iframes (PAGE_NAVIGATION)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                if (currentView === 'single') {
                    const pageItem = document.querySelector(`[data-page="${targetPage}"]`);
                    if (pageItem) { loadPage(targetPage, pageItem); }
                }
            }

            // Forward highlight messages to iframe
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const frame = document.getElementById('prototypeFrame');
                if (frame && frame.contentWindow) {
                    frame.contentWindow.postMessage({
                        action: 'highlight',
                        featureId: event.data.featureId
                    }, '*');
                }

                // If feature is app_order_list, switch to that page
                if (event.data.featureId === 'app_order_list') {
                    const pageItem = document.querySelector(`[data-page="app_my_order_list.html"]`);
                    if (pageItem && currentView === 'single') { loadPage('app_my_order_list.html', pageItem); }
                }
            }
        });
    </script>
</body>
</html>
