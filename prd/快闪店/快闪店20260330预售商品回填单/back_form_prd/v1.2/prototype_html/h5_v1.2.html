<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快闪店预售商品回填单 - H5 完整原型 v1.2</title>
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --geist-black: #171717; --geist-white: #ffffff; --geist-gray-900: #171717; --geist-gray-600: #4d4d4d;
            --geist-gray-500: #666666; --geist-gray-400: #808080; --geist-gray-100: #ebebeb; --geist-gray-50: #fafafa;
            --focus-blue: hsla(212, 100%, 48%, 1); --ship-red: #ff5b4f; --preview-pink: #de1d8d; --develop-blue: #0a72ef;
            --shadow-border: rgba(0, 0, 0, 0.08) 0px 0px 0px 1px; --shadow-subtle: rgba(0, 0, 0, 0.04) 0px 2px 2px;
            --shadow-card: rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 2px, rgba(0,0,0,0.04) 0px 8px 8px -8px, var(--geist-gray-50) 0px 0px 0px 1px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-feature-settings: "liga" 1; -webkit-font-smoothing: antialiased;
            background: var(--geist-white); color: var(--geist-black); min-height: 100vh;
        }
        h1 { text-align: center; margin: 20px 0 0 0; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 2; }
        #prototypeContainer { width: 100%; min-height: 100vh; transition: all 0.3s ease; }
        .global-view { padding: 40px; max-width: 1800px; margin: 0 auto; background: var(--geist-white); }
        .global-view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(399px, 1fr)); gap: 48px; justify-content: center; align-items: start; }
        .global-view .phone-frame-container { width: 399px !important; height: 836px !important; margin: 0 auto; }
        .global-view .phone-frame-container::after { content: attr(data-page-label); display: block; text-align: center; margin-top: 16px; font-size: 14px; font-weight: 500; color: var(--geist-gray-600); letter-spacing: -0.28px; }
        .single-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; background: var(--geist-white); }
        .phone-frame-container { position: relative; width: 399px; height: 836px; background: var(--geist-black); border-radius: 50px; padding: 12px; box-shadow: var(--shadow-card); transition: box-shadow 0.3s ease; flex-shrink: 0; }
        .phone-frame-container:hover { box-shadow: rgba(0,0,0,0.12) 0px 0px 0px 1px, rgba(0,0,0,0.06) 0px 4px 4px, rgba(0,0,0,0.06) 0px 12px 12px -6px, var(--geist-gray-50) 0px 0px 0px 1px; }
        .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: var(--geist-black); border-radius: 0 0 20px 20px; z-index: 100; }
        .phone-screen { width: 375px; height: 812px; background: var(--geist-white); border-radius: 40px; overflow: hidden; position: relative; }
        .phone-screen iframe { width: 375px; height: 812px; border: none; display: block; }
        .controls-bar { position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 1000; background: var(--geist-white); padding: 8px; border-radius: 8px; box-shadow: var(--shadow-card); }
        .control-btn { background: var(--geist-white); color: var(--geist-black); border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-border); font-family: inherit; min-height: 38px; line-height: 1.5; }
        .control-btn:hover { background: var(--geist-gray-50); transform: translateY(-1px); }
        .control-btn.active { background: var(--geist-black); color: var(--geist-white); }
        .control-btn:focus { outline: 2px solid var(--focus-blue); outline-offset: 2px; }
        .page-selector-bar { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: var(--geist-white); border-radius: 8px; padding: 8px; box-shadow: var(--shadow-card); z-index: 1000; display: flex; gap: 6px; max-width: 90vw; overflow-x: auto; }
        .page-selector-bar::-webkit-scrollbar { height: 4px; }
        .page-selector-bar::-webkit-scrollbar-thumb { background: var(--geist-gray-100); border-radius: 2px; }
        .page-item-bar { padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500; color: var(--geist-gray-600); display: flex; align-items: center; gap: 6px; white-space: nowrap; box-shadow: var(--shadow-border); min-height: 38px; line-height: 1.5; }
        .page-item-bar:hover { background: var(--geist-gray-50); color: var(--geist-black); }
        .page-item-bar.active { background: var(--geist-black); color: var(--geist-white); }
        .page-item-bar i { font-size: 14px; width: 14px; }
        .page-dropdown { display: none; position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .dropdown-toggle { background: var(--geist-white); color: var(--geist-black); border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-card); transition: all 0.2s; font-family: inherit; min-height: 38px; line-height: 1.5; }
        .dropdown-toggle:hover { background: var(--geist-gray-50); }
        .dropdown-menu { position: absolute; top: 100%; left: 0; margin-top: 8px; background: var(--geist-white); border-radius: 8px; box-shadow: var(--shadow-card); padding: 8px; min-width: 200px; display: none; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 10px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; color: var(--geist-gray-600); display: flex; align-items: center; gap: 8px; }
        .dropdown-item:hover { background: var(--geist-gray-50); color: var(--geist-black); }
        .dropdown-item.active { background: var(--geist-black); color: var(--geist-white); }
        .dropdown-item i { font-size: 14px; width: 14px; }
        @media (max-width: 1024px) { .page-selector-bar { display: none !important; } .page-dropdown { display: block; } .global-view { padding: 40px 20px; } .global-view-grid { grid-template-columns: repeat(auto-fill, minmax(375px, 1fr)); gap: 30px; } }
        @media (max-width: 768px) { .global-view { padding: 30px 16px; } .global-view-grid { grid-template-columns: 1fr; gap: 24px; } .controls-bar { top: 10px; right: 10px; } .page-dropdown { top: 70px; left: 10px; } }
        .global-view .single-only { display: none !important; }
        .single-view .global-only { display: none !important; }
    </style>
</head>
<body>
    <h1>快闪店预售商品回填单 - H5 原型 v1.2</h1>

    <div class="page-selector-bar single-only">
        <div class="page-item-bar active" data-page="h5_back_form.html" onclick="loadPage('h5_back_form.html', this)">
            <i class="bi bi-file-earmark-text"></i><span>回填单填写</span>
        </div>
        <div class="page-item-bar" data-page="h5_back_form_success.html" onclick="loadPage('h5_back_form_success.html', this)">
            <i class="bi bi-check-circle"></i><span>提交成功</span>
        </div>
    </div>

    <div class="page-dropdown single-only">
        <button class="dropdown-toggle" onclick="toggleDropdown()">
            <i class="bi bi-list"></i><span id="currentPageLabel">回填单填写</span><i class="bi bi-chevron-down" style="margin-left: 4px;"></i>
        </button>
        <div class="dropdown-menu" id="pageDropdownMenu">
            <div class="dropdown-item active" data-page="h5_back_form.html" onclick="loadPage('h5_back_form.html', this)"><i class="bi bi-file-earmark-text"></i><span>回填单填写</span></div>
            <div class="dropdown-item" data-page="h5_back_form_success.html" onclick="loadPage('h5_back_form_success.html', this)"><i class="bi bi-check-circle"></i><span>提交成功</span></div>
        </div>
    </div>

    <div class="controls-bar">
        <button class="control-btn active" id="btnSingleView" onclick="switchView('single')"><i class="bi bi-phone"></i><span>单独界面</span></button>
        <button class="control-btn" id="btnGlobalView" onclick="switchView('global')"><i class="bi bi-grid-3x3"></i><span>全局视图</span></button>
    </div>

    <div id="prototypeContainer" class="single-view">
        <div class="phone-frame-container single-only">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <iframe id="h5Frame" src="h5_pages/h5_back_form.html" frameborder="0"></iframe>
            </div>
        </div>

        <div class="global-view global-only" style="display: none;">
            <div class="global-view-grid">
                <div class="phone-frame-container" data-page-label="回填单填写">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="h5_pages/h5_back_form.html" frameborder="0"></iframe></div>
                </div>
                <div class="phone-frame-container" data-page-label="提交成功">
                    <div class="phone-notch"></div>
                    <div class="phone-screen"><iframe src="h5_pages/h5_back_form_success.html" frameborder="0"></iframe></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'single', currentPage = 'h5_back_form.html', dropdownOpen = false;

        function toggleDropdown() { dropdownOpen = !dropdownOpen; const m = document.getElementById('pageDropdownMenu'); if (dropdownOpen) m.classList.add('show'); else m.classList.remove('show'); }
        document.addEventListener('click', function(e) { const d = document.querySelector('.page-dropdown'); if (d && !d.contains(e.target)) { dropdownOpen = false; const m = document.getElementById('pageDropdownMenu'); if (m) m.classList.remove('show'); } });

        function switchView(mode) {
            currentView = mode; const c = document.getElementById('prototypeContainer');
            const bS = document.getElementById('btnSingleView'), bG = document.getElementById('btnGlobalView');
            if (mode === 'single') { c.className = 'single-view'; bS.classList.add('active'); bG.classList.remove('active'); document.querySelectorAll('.single-only').forEach(e => e.style.display = ''); document.querySelectorAll('.global-only').forEach(e => e.style.display = 'none'); }
            else { c.className = 'global-view'; bG.classList.add('active'); bS.classList.remove('active'); document.querySelectorAll('.single-only').forEach(e => e.style.display = 'none'); document.querySelectorAll('.global-only').forEach(e => e.style.display = ''); }
            window.location.hash = mode;
        }

        function loadPage(pageUrl, element) {
            currentPage = pageUrl; document.getElementById('h5Frame').src = `h5_pages/${pageUrl}`;
            document.querySelectorAll('.page-item-bar').forEach(i => i.classList.remove('active')); document.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
            if (element) { element.classList.add('active'); const n = element.getAttribute('data-page'); const o = document.querySelector(`[data-page="${n}"]:not(.${element.className.split(' ')[0]})`); if (o) o.classList.add('active'); }
            updateDropdownLabel(); dropdownOpen = false; const m = document.getElementById('pageDropdownMenu'); if (m) m.classList.remove('show');
            window.location.hash = `single-${pageUrl}`;
        }

        function updateDropdownLabel() { const n = {'h5_back_form.html':'回填单填写','h5_back_form_success.html':'提交成功'}; const l = document.getElementById('currentPageLabel'); if (l) l.textContent = n[currentPage]||'页面'; }

        window.addEventListener('hashchange', function() { const h = window.location.hash.substring(1); if (h) handleHash(h); });
        window.addEventListener('DOMContentLoaded', function() { const h = window.location.hash.substring(1); if (h) handleHash(h); updateDropdownLabel(); });
        function handleHash(h) { if (h==='global') switchView('global'); else if (h==='single') switchView('single'); else if (h.startsWith('single-')) { const p=h.substring(7); switchView('single'); const i=document.querySelector(`[data-page="${p}"]`); if (i) loadPage(p,i); } }

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'PAGE_NAVIGATION' && currentView === 'single') {
                const i = document.querySelector(`[data-page="${e.data.page}"]`); if (i) loadPage(e.data.page, i);
            }
            if (e.data && e.data.action === 'highlight' && e.data.featureId) {
                const f = document.getElementById('h5Frame'); if (f && f.contentWindow) f.contentWindow.postMessage({action:'highlight',featureId:e.data.featureId},'*');
            }
        });
    </script>
</body>
</html>
